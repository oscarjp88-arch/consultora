<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creditek · Panel de Validación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
:root {
  --azul: #0B1E3D;
  --turquesa: #00C4CC;
  --bg: #F8FAFC;
  --border: #E2E8F0;
  --text2: #4B5563;
  --verde: #16A34A;
  --amarillo: #D97706;
  --rojo: #DC2626;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--azul); }

/* ── Login ── */
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-box { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 36px 30px; width: 100%; max-width: 360px; }
.login-box .logo-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 22px; text-align: center; margin-bottom: 24px; }
.login-box .logo-title span { color: var(--turquesa); }
.login-box input { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 15px; margin-bottom: 12px; font-family: 'DM Sans', sans-serif; }
.login-box input:focus { outline: none; border-color: var(--turquesa); box-shadow: 0 0 0 3px rgba(0,196,204,0.15); }
.login-box button { width: 100%; background: var(--turquesa); color: white; border: none; border-radius: 10px; padding: 12px; font-size: 14.5px; font-weight: 700; cursor: pointer; margin-top: 6px; }
.login-box button:disabled { background: #CBD5E1; }
.login-err { color: var(--rojo); font-size: 12.5px; margin-top: 10px; display: none; }
.login-err.show { display: block; }

/* ── App ── */
#app { display: none; }
#app.show { display: block; }
header.topbar {
  background: white; border-bottom: 1px solid var(--border); padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 5;
}
.topbar .logo-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 17px; }
.topbar .logo-title span { color: var(--turquesa); }
.topbar .right { display: flex; align-items: center; gap: 14px; font-size: 12.5px; color: var(--text2); }
.topbar button.logout { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; color: var(--text2); }

.counter-bar { background: var(--azul); color: white; padding: 10px 24px; font-size: 13.5px; font-weight: 600; }
.counter-bar b { color: var(--turquesa); font-size: 15px; }

.filters { max-width: 1100px; margin: 18px auto 0; padding: 0 20px; display: flex; gap: 10px; flex-wrap: wrap; }
.filters select, .filters input {
  border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px;
  font-family: 'DM Sans', sans-serif; background: white; color: var(--azul);
}

.list { max-width: 1100px; margin: 16px auto 60px; padding: 0 20px; display: flex; flex-direction: column; gap: 14px; }
.empty-state { text-align: center; color: var(--text2); font-size: 14px; padding: 60px 0; }

.card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
.card-name { font-weight: 700; font-size: 16px; }
.card-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
.badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: .04em; }
.badge.pendiente { background: #FEF3C7; color: #92400E; }
.badge.verde { background: #DCFCE7; color: #166534; }
.badge.amarillo { background: #FEF3C7; color: #92400E; }
.badge.rojo { background: #FEE2E2; color: #991B1B; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px; }
@media (max-width: 640px) { .grid2 { grid-template-columns: 1fr; } }
.info-block { font-size: 13px; }
.info-block .label { font-size: 11px; color: #94A3B8; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
.info-block .value { margin-bottom: 8px; }
.ref-line { font-size: 12.5px; color: var(--text2); margin-bottom: 4px; }

.foto-btn { background: #E8F4F8; color: var(--azul); border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; cursor: pointer; font-weight: 600; }
.foto-preview { margin-top: 8px; max-width: 220px; border-radius: 8px; border: 1px solid var(--border); display: none; }
.fotos-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 6px; }
.foto-slot { text-align: center; }
.foto-slot-label { font-size: 10.5px; color: #94A3B8; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
.foto-slot .foto-preview { max-width: 130px; max-height: 130px; }

.checklist { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 6px; }
.checklist .item { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 7px; }
.checklist input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--turquesa); }

.nota-box { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 11px; font-size: 12.5px; font-family: 'DM Sans', sans-serif; margin-top: 10px; resize: vertical; min-height: 44px; }
.nota-box:focus { outline: none; border-color: var(--turquesa); }

.actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.actions button {
  flex: 1; min-width: 110px; border: none; border-radius: 9px; padding: 10px; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: 'DM Sans', sans-serif; color: white;
}
.actions .btn-aprobar { background: var(--verde); }
.actions .btn-dudoso { background: var(--amarillo); }
.actions .btn-rechazar { background: var(--rojo); }
.actions button:disabled { background: #CBD5E1; cursor: not-allowed; }
.resuelta-tag { font-size: 12px; color: var(--text2); margin-top: 10px; }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="logo-title">Credi<span>tek</span> · Validación</div>
    <input type="email" id="loginEmail" placeholder="Correo" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password">
    <button id="btnLogin">Entrar</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="app">
  <header class="topbar">
    <div class="logo-title">Credi<span>tek</span> · Validación</div>
    <div class="right">
      <span id="userEmail"></span>
      <button class="logout" id="btnLogout">Salir</button>
    </div>
  </header>

  <div class="counter-bar">Pendientes de hoy: <b id="counterHoy">—</b></div>

  <div class="filters">
    <select id="filtroEstado">
      <option value="pendiente">Pendientes</option>
      <option value="verde">Aprobados</option>
      <option value="amarillo">Dudosos</option>
      <option value="rojo">Rechazados</option>
      <option value="todos">Todos</option>
    </select>
    <select id="filtroOrigen"><option value="">Todos los orígenes</option></select>
    <input type="date" id="filtroFecha">
    <button id="btnLimpiarFiltros" style="border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;background:white;cursor:pointer;">Limpiar filtros</button>
  </div>

  <div class="list" id="list">
    <div class="empty-state">Cargando solicitudes...</div>
  </div>
</div>

<script>
// ─── Config ─────────────────────────────────────────────────────────────
// Proyecto Supabase "creditek-erp" — separado por completo del proyecto de Sofía.
const SUPABASE_URL = 'https://jfkmiyvcdfbsbwchyvol.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impma21peXZjZGZic2J3Y2h5dm9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMzA5NjgsImV4cCI6MjA5OTcwNjk2OH0.kpAjGLbDnycU-B1kc-AqOvj6X2xH-KHBiKB94V7prcQ';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const CHECKLIST_ITEMS = [
  { key: 'celular_contesta', label: 'Cliente contesta el celular registrado' },
  { key: 'ref1_confirma', label: 'Referencia 1 contesta y confirma conocerlo' },
  { key: 'ref2_confirma', label: 'Referencia 2 contesta y confirma conocerlo' },
  { key: 'datos_coinciden_foto', label: 'Datos coinciden con la foto de la cédula' },
];

let currentUser = null;
let solicitudesCache = [];

// ─── Login ──────────────────────────────────────────────────────────────
document.getElementById('btnLogin').addEventListener('click', hacerLogin);
document.getElementById('loginPass').addEventListener('keydown', (e) => { if (e.key === 'Enter') hacerLogin(); });

async function hacerLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('loginErr');
  err.classList.remove('show');
  if (!email || !password) return;
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  btn.disabled = false;
  btn.textContent = 'Entrar';
  if (error) {
    err.textContent = 'Correo o contraseña incorrectos.';
    err.classList.add('show');
    return;
  }
  entrarApp(data.user);
}

document.getElementById('btnLogout').addEventListener('click', async () => {
  await sb.auth.signOut();
  location.reload();
});

async function entrarApp(user) {
  currentUser = user;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  document.getElementById('userEmail').textContent = user.email;
  await cargarOrigenes();
  await cargarSolicitudes();
}

// Restaurar sesión si ya existe (evita re-login en cada recarga)
sb.auth.getSession().then(({ data }) => {
  if (data.session) entrarApp(data.session.user);
});

// ─── Filtros ────────────────────────────────────────────────────────────
document.getElementById('filtroEstado').addEventListener('change', cargarSolicitudes);
document.getElementById('filtroOrigen').addEventListener('change', cargarSolicitudes);
document.getElementById('filtroFecha').addEventListener('change', cargarSolicitudes);
document.getElementById('btnLimpiarFiltros').addEventListener('click', () => {
  document.getElementById('filtroEstado').value = 'pendiente';
  document.getElementById('filtroOrigen').value = '';
  document.getElementById('filtroFecha').value = '';
  cargarSolicitudes();
});

async function cargarOrigenes() {
  const { data, error } = await sb.from('origenes').select('codigo, nombre').eq('activo', true).eq('tipo', 'propia').order('codigo');
  if (error || !data) return;
  const select = document.getElementById('filtroOrigen');
  select.innerHTML = '<option value="">Todos los orígenes</option>' +
    data.map(o => `<option value="${o.codigo}">${o.nombre}</option>`).join('');
}

// ─── Contador "pendientes de hoy" (Colombia, UTC-5) ─────────────────────
function inicioHoyColombiaISO() {
  const ahora = new Date();
  const colombiaMs = ahora.getTime() - 5 * 3600 * 1000;
  const colDate = new Date(colombiaMs);
  const inicioCol = Date.UTC(colDate.getUTCFullYear(), colDate.getUTCMonth(), colDate.getUTCDate()) + 5 * 3600 * 1000;
  return new Date(inicioCol).toISOString();
}

async function actualizarContador() {
  const { count, error } = await sb.from('solicitudes')
    .select('id', { count: 'exact', head: true })
    .eq('estado_validacion', 'pendiente')
    .gte('created_at', inicioHoyColombiaISO());
  document.getElementById('counterHoy').textContent = error ? '—' : (count ?? 0);
}

// ─── Cargar solicitudes ───────────────────────────────────────────────
async function cargarSolicitudes() {
  const list = document.getElementById('list');
  list.innerHTML = '<div class="empty-state">Cargando solicitudes...</div>';

  const estado = document.getElementById('filtroEstado').value;
  const origen = document.getElementById('filtroOrigen').value;
  const fecha = document.getElementById('filtroFecha').value;

  let query = sb.from('solicitudes')
    .select('*, clientes(*, referencias(*)), origenes(nombre, tipo), documentos_solicitud(*)')
    .order('created_at', { ascending: true });

  if (estado !== 'todos') query = query.eq('estado_validacion', estado);
  if (origen) query = query.eq('origen_codigo', origen);
  if (fecha) {
    query = query.gte('created_at', `${fecha}T00:00:00`).lt('created_at', `${fecha}T23:59:59`);
  }

  const { data, error } = await query;
  actualizarContador();

  if (error) {
    list.innerHTML = `<div class="empty-state">Error cargando solicitudes: ${error.message}</div>`;
    return;
  }
  solicitudesCache = data || [];
  renderList();
}

function renderList() {
  const list = document.getElementById('list');
  if (!solicitudesCache.length) {
    list.innerHTML = '<div class="empty-state">No hay solicitudes con estos filtros.</div>';
    return;
  }
  list.innerHTML = '';
  solicitudesCache.forEach(sol => list.appendChild(renderCard(sol)));
}

function resolverFotoSolicitud(sol, tipo, legacyPath) {
  const documentos = sol.documentos_solicitud || [];
  const documentoActual = documentos
    .find(documento => documento.tipo === tipo);
  return documentoActual?.storage_path || legacyPath || null;
}

function renderFotoSlot(label, tipo, disponible) {
  if (!disponible) {
    return `<div class="foto-slot"><div class="foto-slot-label">${label}</div><span style="font-size:12px;color:#94A3B8;">No subida</span></div>`;
  }
  return `
    <div class="foto-slot">
      <div class="foto-slot-label">${label}</div>
      <button class="foto-btn" data-tipo="${tipo}">Ver</button>
      <br><img class="foto-preview" />
    </div>
  `;
}

function renderCard(sol) {
  const cliente = sol.clientes || {};
  const referencias = cliente.referencias || [];
  const ref1 = referencias[0] || {};
  const ref2 = referencias[1] || {};
  const checklist = sol.checklist || {};
  const resuelta = sol.estado_validacion !== 'pendiente';
  const fotoPaths = {
    frente: resolverFotoSolicitud(
      sol,
      'frente',
      cliente.foto_cedula_frente_path,
    ),
    reverso: resolverFotoSolicitud(
      sol,
      'reverso',
      cliente.foto_cedula_reverso_path,
    ),
    selfie: resolverFotoSolicitud(
      sol,
      'selfie',
      cliente.selfie_cedula_path,
    ),
  };
  // AJUSTES v26, 20-jul-2026 — Paquete 2: no se puede aprobar sin las 3 fotos.
  const faltanFotos =
    !fotoPaths.frente ||
    !fotoPaths.reverso ||
    !fotoPaths.selfie;

  const div = document.createElement('div');
  div.className = 'card';

  const fecha = sol.created_at ? new Date(sol.created_at).toLocaleString('es-CO', { dateStyle: 'medium', timeStyle: 'short' }) : '';

  div.innerHTML = `
    <div class="card-top">
      <div>
        <div class="card-name">${escapeHtml(cliente.nombre_completo || '(sin nombre)')}</div>
        <div class="card-meta">Cédula ${escapeHtml(cliente.cedula || '—')} · ${escapeHtml(cliente.celular || '—')} · ${escapeHtml(cliente.ciudad || '—')}</div>
        <div class="card-meta">${escapeHtml(sol.origenes?.nombre || sol.origen_codigo || '—')} · Vendedor: ${escapeHtml(sol.vendedor_nombre || '—')} · ${fecha}</div>
      </div>
      <span class="badge ${sol.estado_validacion}">${etiquetaEstado(sol.estado_validacion)}</span>
    </div>

    <div class="grid2">
      <div class="info-block">
        <div class="label">Producto de interés</div>
        <div class="value">${escapeHtml(sol.producto_interes || '—')}</div>
        <div class="label">Financiera</div>
        <div class="value">${escapeHtml(sol.financiera || 'No indicada')}</div>
        <div class="label">Fotos del cliente</div>
        <div class="fotos-row">
          ${renderFotoSlot('Frente', 'frente', !!fotoPaths.frente)}
          ${renderFotoSlot('Selfie', 'selfie', !!fotoPaths.selfie)}
          ${renderFotoSlot('Reverso', 'reverso', !!fotoPaths.reverso)}
        </div>
      </div>
      <div class="info-block">
        <div class="label">Referencias</div>
        <div class="ref-line">1. ${escapeHtml(ref1.nombre || '—')} — ${escapeHtml(ref1.telefono || '—')}</div>
        <div class="ref-line">2. ${escapeHtml(ref2.nombre || '—')} — ${escapeHtml(ref2.telefono || '—')}</div>
        <div class="label" style="margin-top:8px;">Autorización</div>
        <div class="value" style="font-size:12px;">
          Datos: ${cliente.autorizacion_datos ? '✓' : '✗'} · Comercial: ${cliente.autorizacion_comercial ? '✓' : '✗'}
        </div>
      </div>
    </div>

    <div class="checklist">
      ${CHECKLIST_ITEMS.map(item => `
        <label class="item">
          <input type="checkbox" data-key="${item.key}" ${checklist[item.key] ? 'checked' : ''} ${resuelta ? 'disabled' : ''}>
          ${item.label}
        </label>
      `).join('')}
    </div>

    ${resuelta ? `
      <div class="resuelta-tag">
        Resuelta por ${escapeHtml(sol.validado_por || '—')} el ${sol.validado_at ? new Date(sol.validado_at).toLocaleString('es-CO') : '—'}
        ${sol.nota_validacion ? `<br>Nota: ${escapeHtml(sol.nota_validacion)}` : ''}
      </div>
    ` : `
      <textarea class="nota-box" placeholder="Nota (obligatoria para Dudoso o Rechazar)"></textarea>
      ${faltanFotos ? '<div style="font-size:12px;color:var(--rojo);margin-top:6px;">Faltan fotos del cliente — no se puede aprobar hasta que las 3 estén subidas.</div>' : ''}
      <div class="actions">
        <button class="btn-aprobar" ${faltanFotos ? 'disabled title="Faltan fotos del cliente"' : ''}>🟢 Aprobar</button>
        <button class="btn-dudoso" disabled>🟡 Dudoso</button>
        <button class="btn-rechazar" disabled>🔴 Rechazar</button>
      </div>
    `}
  `;

  // Checklist: guardar al vuelo
  if (!resuelta) {
    div.querySelectorAll('.checklist input[type=checkbox]').forEach(cb => {
      cb.addEventListener('change', async () => {
        const nuevoChecklist = { ...(sol.checklist || {}) };
        nuevoChecklist[cb.dataset.key] = cb.checked;
        sol.checklist = nuevoChecklist;
        await sb.from('solicitudes').update({ checklist: nuevoChecklist }).eq('id', sol.id);
      });
    });

    const notaBox = div.querySelector('.nota-box');
    const btnDudoso = div.querySelector('.btn-dudoso');
    const btnRechazar = div.querySelector('.btn-rechazar');
    const btnAprobar = div.querySelector('.btn-aprobar');
    notaBox.addEventListener('input', () => {
      const tieneNota = notaBox.value.trim().length > 0;
      btnDudoso.disabled = !tieneNota;
      btnRechazar.disabled = !tieneNota;
    });

    btnAprobar.addEventListener('click', () => resolverSolicitud(sol.id, 'verde', notaBox.value.trim() || null));
    btnDudoso.addEventListener('click', () => resolverSolicitud(sol.id, 'amarillo', notaBox.value.trim()));
    btnRechazar.addEventListener('click', () => resolverSolicitud(sol.id, 'rojo', notaBox.value.trim()));
  }

  // Fotos (frente / selfie / reverso): signed URL bajo demanda, cada botón
  // trae la suya propia (AJUSTES_Registro_v2, Cambio 3).
  div.querySelectorAll('.foto-btn').forEach(fotoBtn => {
    fotoBtn.addEventListener('click', async () => {
      const path = fotoPaths[fotoBtn.dataset.tipo];
      if (!path) {
        alert('No hay una foto disponible.');
        return;
      }
      fotoBtn.textContent = 'Cargando...';
      const { data, error } = await sb.storage.from('cedulas').createSignedUrl(path, 300);
      fotoBtn.textContent = 'Ver';
      if (error || !data) { alert('No se pudo cargar la foto.'); return; }
      const img = fotoBtn.parentElement.querySelector('.foto-preview');
      img.src = data.signedUrl;
      img.style.display = 'block';
    });
  });

  return div;
}

async function resolverSolicitud(id, estado, nota) {
  const { error } = await sb.from('solicitudes').update({
    estado_validacion: estado,
    validado_por: currentUser.email,
    validado_at: new Date().toISOString(),
    nota_validacion: nota,
  }).eq('id', id);
  if (error) { alert('No se pudo guardar: ' + error.message); return; }
  cargarSolicitudes();
}

function etiquetaEstado(e) {
  return { pendiente: 'Pendiente', verde: 'Aprobado', amarillo: 'Dudoso', rojo: 'Rechazado' }[e] || e;
}
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
</script>
</body>
</html>
