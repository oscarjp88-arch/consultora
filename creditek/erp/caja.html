<style>
:root {
  --azul: #0B1E3D; --turquesa: #00C4CC; --bg: #F5F5F7; --surface: #FFFFFF;
  --border: rgba(11,30,61,0.08); --text2: #6E6E76; --verde: #16A34A; --amarillo: #D97706; --rojo: #DC2626;
  --radius: 18px; --radius-sm: 11px;
  --shadow-sm: 0 1px 2px rgba(11,30,61,0.04), 0 1px 1px rgba(11,30,61,0.03);
  --shadow-md: 0 12px 28px -10px rgba(11,30,61,0.16);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--azul); -webkit-font-smoothing: antialiased; }

.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle at 30% 20%, #EAFBFC 0%, var(--bg) 55%); }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 40px 32px; width: 100%; max-width: 360px; box-shadow: var(--shadow-md); }
.login-box img.logo { display: block; height: 40px; margin: 0 auto 22px; object-fit: contain; }
.login-box input { width: 100%; border: 1px solid transparent; background: var(--bg); border-radius: var(--radius-sm); padding: 13px 14px; font-size: 15px; margin-bottom: 12px; font-family: inherit; transition: all .15s ease; }
.login-box input:focus { outline: none; background: white; border-color: var(--turquesa); box-shadow: 0 0 0 4px rgba(0,196,204,0.14); }
.login-box button { width: 100%; background: var(--turquesa); color: white; border: none; border-radius: var(--radius-sm); padding: 13px; font-size: 14.5px; font-weight: 700; cursor: pointer; margin-top: 6px; box-shadow: 0 6px 16px -4px rgba(0,196,204,0.5); transition: transform .12s ease, box-shadow .12s ease; }
.login-box button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 20px -4px rgba(0,196,204,0.55); }
.login-box button:disabled { background: #D2D2D7; box-shadow: none; }
.login-err { color: var(--rojo); font-size: 12.5px; margin-top: 10px; display: none; }
.login-err.show { display: block; }

.sin-perfil-screen { min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 20px; text-align: center; }
.sin-perfil-screen.show { display: flex; }
.sin-perfil-box { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 40px 32px; max-width: 380px; box-shadow: var(--shadow-md); }
.sin-perfil-box .icono { font-size: 34px; margin-bottom: 12px; }
.sin-perfil-box h2 { font-family: 'Montserrat', sans-serif; font-size: 17px; margin-bottom: 8px; }
.sin-perfil-box p { font-size: 13.5px; color: var(--text2); line-height: 1.5; margin-bottom: 18px; }
.sin-perfil-box button { border: 1px solid var(--border); background: var(--bg); border-radius: var(--radius-sm); padding: 10px 18px; font-size: 13px; cursor: pointer; color: var(--azul); font-weight: 600; }

#app { display: none; }
#app.show { display: block; }
.navbar { background: rgba(255,255,255,0.72); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 18px; position: sticky; top: 0; z-index: 10; flex-wrap: wrap; }
.navbar img.logo { height: 26px; object-fit: contain; flex-shrink: 0; }
.nav-links { display: flex; gap: 4px; overflow-x: auto; flex: 1; scrollbar-width: none; }
.nav-links::-webkit-scrollbar { display: none; }
.nav-links a { white-space: nowrap; text-decoration: none; color: var(--text2); font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 999px; transition: background .15s ease, color .15s ease; }
.nav-links a:hover { background: rgba(11,30,61,0.05); color: var(--azul); }
.nav-links a.active { background: var(--azul); color: white; box-shadow: var(--shadow-sm); }
.nav-user { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text2); flex-shrink: 0; }
.nav-user .quien { text-align: right; line-height: 1.3; }
.nav-user .quien b { color: var(--azul); font-size: 12.5px; }
.nav-user button { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 7px 14px; font-size: 12px; cursor: pointer; color: var(--text2); font-weight: 600; transition: background .15s ease; }
.nav-user button:hover { background: #EAEAEC; }

.page { max-width: 1100px; margin: 0 auto; padding: 32px 24px 60px; }
.page-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
.page-top h1 { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }

.banner-ok {
  position: sticky; top: 74px; z-index: 8; margin: 0 auto 18px; max-width: 1100px;
  background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; border-radius: var(--radius-sm);
  padding: 13px 18px; font-size: 13.5px; font-weight: 700; display: none; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow-sm);
}
.banner-ok.show { display: flex; }
.banner-ok button { background: none; border: none; color: #166534; font-weight: 700; cursor: pointer; font-size: 16px; }

.filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; align-items: center; }
.filters select, .filters input { border: 1px solid var(--border); background: var(--surface); border-radius: var(--radius-sm); padding: 9px 13px; font-size: 13px; font-family: inherit; color: var(--azul); }
.filters select:focus, .filters input:focus { outline: none; border-color: var(--turquesa); box-shadow: 0 0 0 3px rgba(0,196,204,0.12); }

/* ── Cuadrito ── */
.cuadrito { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 20px; }
.cuadrito-header { background: var(--azul); color: white; padding: 16px 22px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.cuadrito-header .titulo { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 15px; }
.cuadrito-header .sub { font-size: 12px; opacity: .8; margin-top: 2px; }
.cuadrito-estado { font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 999px; text-transform: uppercase; letter-spacing: .03em; }
.cuadrito-estado.abierta { background: #FEF3C7; color: #92400E; }
.cuadrito-estado.cerrada { background: #DCFCE7; color: #166534; }
.cuadrito-body { padding: 20px 22px; }
.cuadrito-seccion { margin-bottom: 18px; }
.cuadrito-seccion h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--text2); font-weight: 700; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.cuadrito-linea { display: flex; justify-content: space-between; font-size: 13.5px; padding: 5px 0; }
.cuadrito-linea .izq { color: var(--azul); }
.cuadrito-linea .der { font-weight: 700; }
.cuadrito-linea .meta { font-size: 11.5px; color: var(--text2); display: block; }
.cuadrito-vacio { font-size: 12.5px; color: var(--text2); font-style: italic; }
.cuadrito-totales { background: var(--bg); border-radius: var(--radius-sm); padding: 14px 16px; margin-top: 8px; }
.cuadrito-totales .cuadrito-linea.esperado { font-size: 16px; font-weight: 800; border-top: 1px dashed var(--border); margin-top: 8px; padding-top: 10px; }
.cuadrito-totales .cuadrito-linea.esperado.negativo .der { color: var(--rojo); }

.cierre-box { border-top: 1px solid var(--border); padding-top: 18px; margin-top: 4px; }
.campo { margin-bottom: 13px; }
.campo label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 600; }
.campo input, .campo textarea { width: 100%; border: 1px solid transparent; background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13.5px; font-family: inherit; transition: all .15s ease; }
.campo input:focus, .campo textarea:focus { outline: none; background: white; border-color: var(--turquesa); box-shadow: 0 0 0 3px rgba(0,196,204,0.12); }
.diferencia-preview { font-size: 13px; font-weight: 700; margin: 8px 0 14px; }
.diferencia-preview.ok { color: var(--verde); }
.diferencia-preview.mal { color: var(--rojo); }
.btn-primary { background: var(--turquesa); color: white; border: none; border-radius: 999px; padding: 12px 20px; font-size: 13.5px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 16px -4px rgba(0,196,204,0.5); transition: transform .12s ease; }
.btn-primary:hover { transform: translateY(-1px); }
.btn-secundario { background: var(--bg); color: var(--azul); border: 1px solid var(--border); border-radius: 999px; padding: 12px 20px; font-size: 13.5px; font-weight: 700; cursor: pointer; margin-left: 8px; }
.modal-err { color: var(--rojo); font-size: 12.5px; margin-top: 8px; display: none; }
.modal-err.show { display: block; }

/* ── Consolidado (central) ── */
.tabla-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
th { background: rgba(11,30,61,0.02); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--text2); font-weight: 700; }
tr:last-child td { border-bottom: none; }
tr.fila-abierta { background: #FEF2F2; }
.badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: .03em; }
.badge.cerrada { background: #DCFCE7; color: #166534; }
.badge.abierta { background: #FEE2E2; color: #991B1B; }
.empty-state { text-align: center; color: var(--text2); font-size: 14px; padding: 40px 0; }
</style>
</head>

<script>
const SUPABASE_URL = 'https://jfkmiyvcdfbsbwchyvol.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impma21peXZjZGZic2J3Y2h5dm9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMzA5NjgsImV4cCI6MjA5OTcwNjk2OH0.kpAjGLbDnycU-B1kc-AqOvj6X2xH-KHBiKB94V7prcQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentPerfil = null;
let tiendasCache = [];

function esCentral() { return !!currentPerfil && (currentPerfil.rol === 'gerencia' || currentPerfil.rol === 'auditoria'); }

document.getElementById('btnLogin').addEventListener('click', hacerLogin);
document.getElementById('loginPass').addEventListener('keydown', (e) => { if (e.key === 'Enter') hacerLogin(); });

async function hacerLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('loginErr');
  err.classList.remove('show');
  if (!email || !password) return;
  btn.disabled = true; btn.textContent = 'Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Entrar';
  if (error) { err.textContent = 'Correo o contraseña incorrectos.'; err.classList.add('show'); return; }
  entrarApp(data.user);
}

document.getElementById('btnLogout').addEventListener('click', cerrarSesion);
document.getElementById('btnSalirSinPerfil').addEventListener('click', cerrarSesion);
async function cerrarSesion() { await sb.auth.signOut(); location.reload(); }

async function entrarApp(user) {
  currentUser = user;
  const { data: perfil, error } = await sb.from('perfiles').select('*').eq('id', user.id).maybeSingle();
  if (error || !perfil || !perfil.activo) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('sinPerfilScreen').classList.add('show');
    return;
  }
  currentPerfil = perfil;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  pintarNavUser();
  initPagina();
}

function pintarNavUser() {
  document.getElementById('navNombre').textContent = currentPerfil.nombre || currentUser.email;
  const rolLabel = { gerencia: 'Gerencia', auditoria: 'Auditoría', admin_tienda: 'Admin tienda', asesor: 'Asesor' }[currentPerfil.rol] || currentPerfil.rol;
  document.getElementById('navRolTienda').textContent = currentPerfil.tienda_codigo ? `${rolLabel} · ${currentPerfil.tienda_codigo}` : rolLabel;
}

sb.auth.getSession().then(({ data }) => { if (data.session) entrarApp(data.session.user); });

function fmtCOP(n) { return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n || 0); }
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function mostrarBanner(texto) {
  document.getElementById('bannerOkTexto').textContent = texto;
  document.getElementById('bannerOk').classList.add('show');
}
document.getElementById('btnCerrarBanner').addEventListener('click', () => document.getElementById('bannerOk').classList.remove('show'));

// ─── Página: Caja ───────────────────────────────────────────────────
function initPagina() {
  const hoy = new Date().toISOString().slice(0, 10);

  if (esCentral()) {
    document.getElementById('vistaCentral').style.display = 'block';
    document.getElementById('fechaDesde').value = hoy;
    document.getElementById('fechaHasta').value = hoy;
    document.getElementById('btnActualizarConsolidado').addEventListener('click', cargarConsolidado);
    document.getElementById('filtroTiendaCentral').addEventListener('change', cargarConsolidado);
    cargarTiendasYConsolidado();
  } else {
    document.getElementById('vistaTienda').style.display = 'block';
    document.getElementById('fechaTienda').value = hoy;
    document.getElementById('fechaTienda').addEventListener('change', () => cargarCuadrito(currentPerfil.tienda_codigo, document.getElementById('fechaTienda').value));
    cargarCuadrito(currentPerfil.tienda_codigo, hoy);
  }
}

// ─── Cálculo del cuadrito (compartido) ─────────────────────────────────
async function calcularCuadrito(tienda, fecha) {
  const [{ data: ventas }, { data: gastos }, { data: caja }] = await Promise.all([
    sb.from('ventas').select('*, clientes(nombre_completo), creditos(*), venta_items(*, productos(nombre, tipo))')
      .eq('tienda_codigo', tienda).eq('fecha', fecha).eq('anulada', false),
    sb.from('gastos').select('*, conceptos_gasto(nombre, preautorizado)').eq('tienda_codigo', tienda).eq('fecha', fecha),
    sb.from('caja_diaria').select('*').eq('tienda_codigo', tienda).eq('fecha', fecha).maybeSingle(),
  ]);

  const ventasList = ventas || [];
  const gastosValidos = (gastos || []).filter(g => g.conceptos_gasto?.preautorizado || g.estado === 'aprobado');

  const telefonos = [];
  const accesoriosMap = {};
  ventasList.forEach(v => {
    (v.venta_items || []).forEach(it => {
      if (it.productos?.tipo === 'serializado') {
        telefonos.push({ nombre: it.productos.nombre, tipo: v.tipo, monto: v.tipo === 'credito' ? (v.creditos?.[0]?.cuota_inicial ?? v.creditos?.cuota_inicial ?? 0) : it.precio_venta });
      } else {
        const key = it.productos?.nombre || 'Producto';
        if (!accesoriosMap[key]) accesoriosMap[key] = { nombre: key, cantidad: 0, total: 0 };
        accesoriosMap[key].cantidad += it.cantidad;
        accesoriosMap[key].total += it.cantidad * it.precio_venta;
      }
    });
  });

  const creditosDelDia = ventasList.filter(v => v.tipo === 'credito').map(v => {
    const credito = Array.isArray(v.creditos) ? v.creditos[0] : v.creditos;
    const celular = (v.venta_items || []).find(it => it.productos?.tipo === 'serializado');
    return {
      cliente: v.clientes?.nombre_completo || 'Cliente general',
      producto: celular?.productos?.nombre || '—',
      financiera: credito?.financiera || '—',
      inicial: credito?.cuota_inicial || 0,
      financiado: (v.total || 0) - (credito?.cuota_inicial || 0),
    };
  });

  const totalContado = ventasList.filter(v => v.tipo === 'contado').reduce((s, v) => s + Number(v.total || 0), 0);
  const totalIniciales = creditosDelDia.reduce((s, c) => s + Number(c.inicial || 0), 0);
  const totalGastos = gastosValidos.reduce((s, g) => s + Number(g.monto || 0), 0);
  const esperado = totalContado + totalIniciales - totalGastos;

  return { telefonos, accesorios: Object.values(accesoriosMap), creditosDelDia, gastos: gastosValidos, totalContado, totalIniciales, totalGastos, esperado, caja };
}

// ─── Vista tienda ───────────────────────────────────────────────────
async function cargarCuadrito(tienda, fecha) {
  const cont = document.getElementById('cuadritoCont');
  cont.innerHTML = '<div class="empty-state">Cargando...</div>';
  const c = await calcularCuadrito(tienda, fecha);
  const tiendaNombre = currentPerfil.tienda_codigo || tienda;
  const cerrada = c.caja && c.caja.estado === 'cerrada';

  cont.innerHTML = `
    <div class="cuadrito">
      <div class="cuadrito-header">
        <div>
          <div class="titulo">CAJA DIARIA — ${escapeHtml(tiendaNombre)}</div>
          <div class="sub">${new Date(fecha + 'T12:00:00').toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' })}</div>
        </div>
        <span class="cuadrito-estado ${cerrada ? 'cerrada' : 'abierta'}">${cerrada ? 'Cerrada' : 'Abierta'}</span>
      </div>
      <div class="cuadrito-body">
        <div class="cuadrito-seccion">
          <h3>Teléfonos</h3>
          ${c.telefonos.length ? c.telefonos.map(t => `
            <div class="cuadrito-linea"><span class="izq">${escapeHtml(t.nombre)} <span class="meta">(${t.tipo === 'credito' ? 'crédito' : 'contado'})</span></span><span class="der">${t.tipo === 'credito' ? 'Inicial: ' : ''}${fmtCOP(t.monto)}</span></div>
          `).join('') : '<div class="cuadrito-vacio">Sin ventas de celulares hoy.</div>'}
        </div>
        <div class="cuadrito-seccion">
          <h3>Accesorios</h3>
          ${c.accesorios.length ? c.accesorios.map(a => `
            <div class="cuadrito-linea"><span class="izq">${escapeHtml(a.nombre)} <span class="meta">${a.cantidad} ud</span></span><span class="der">${fmtCOP(a.total)}</span></div>
          `).join('') : '<div class="cuadrito-vacio">Sin ventas de accesorios hoy.</div>'}
        </div>
        <div class="cuadrito-seccion">
          <h3>Créditos del día</h3>
          ${c.creditosDelDia.length ? c.creditosDelDia.map(cr => `
            <div class="cuadrito-linea"><span class="izq">${escapeHtml(cr.cliente)} — ${escapeHtml(cr.producto)} — ${escapeHtml(cr.financiera)}</span></div>
            <div class="cuadrito-linea"><span class="izq meta">Inicial: ${fmtCOP(cr.inicial)} | Financiado: ${fmtCOP(cr.financiado)}</span></div>
          `).join('') : '<div class="cuadrito-vacio">Sin créditos hoy.</div>'}
        </div>
        <div class="cuadrito-seccion">
          <h3>Gastos</h3>
          ${c.gastos.length ? c.gastos.map(g => `
            <div class="cuadrito-linea"><span class="izq">${escapeHtml(g.conceptos_gasto?.nombre || '—')}</span><span class="der">${fmtCOP(g.monto)}</span></div>
          `).join('') : '<div class="cuadrito-vacio">Sin gastos hoy.</div>'}
        </div>
        <div class="cuadrito-totales">
          <div class="cuadrito-linea"><span class="izq">Total contado</span><span class="der">${fmtCOP(c.totalContado)}</span></div>
          <div class="cuadrito-linea"><span class="izq">Total iniciales</span><span class="der">${fmtCOP(c.totalIniciales)}</span></div>
          <div class="cuadrito-linea"><span class="izq">Total gastos</span><span class="der">-${fmtCOP(c.totalGastos)}</span></div>
          <div class="cuadrito-linea esperado ${c.esperado < 0 ? 'negativo' : ''}"><span class="izq">Efectivo esperado</span><span class="der">${fmtCOP(c.esperado)}</span></div>
        </div>

        ${cerrada ? `
          <div class="cierre-box">
            <div class="cuadrito-linea"><span class="izq">Efectivo contado</span><span class="der">${fmtCOP(c.caja.efectivo_contado)}</span></div>
            <div class="cuadrito-linea"><span class="izq">Diferencia</span><span class="der">${fmtCOP(c.caja.diferencia)}</span></div>
            ${c.caja.nota ? `<div class="cuadrito-vacio" style="margin-top:6px;">Nota: ${escapeHtml(c.caja.nota)}</div>` : ''}
            <button class="btn-primary" id="btnCompartirWA" style="margin-top:14px;">Compartir por WhatsApp</button>
          </div>
        ` : (currentPerfil.rol === 'admin_tienda' ? `
          <div class="cierre-box">
            <div class="campo"><label>Efectivo contado (arqueo físico)</label><input type="number" id="efectivoContado" min="0" placeholder="0"></div>
            <div class="diferencia-preview" id="diferenciaPreview"></div>
            <div class="campo" id="campoNota" style="display:none;"><label>¿Por qué no cuadra?</label><textarea id="notaDiferencia" rows="2"></textarea></div>
            <div class="modal-err" id="cierreErr"></div>
            <button class="btn-primary" id="btnCerrarCaja">Cerrar caja</button>
          </div>
        ` : '')}
      </div>
    </div>
  `;

  if (!cerrada && currentPerfil.rol === 'admin_tienda') {
    const inputContado = document.getElementById('efectivoContado');
    inputContado.addEventListener('input', () => {
      const contado = Number(inputContado.value || 0);
      const dif = contado - c.esperado;
      const prev = document.getElementById('diferenciaPreview');
      prev.textContent = `Diferencia: ${fmtCOP(dif)}`;
      prev.className = 'diferencia-preview ' + (dif === 0 ? 'ok' : 'mal');
      document.getElementById('campoNota').style.display = dif !== 0 ? 'block' : 'none';
    });
    document.getElementById('btnCerrarCaja').addEventListener('click', () => cerrarCajaAccion(tienda, fecha, c.esperado));
  }

  if (cerrada) {
    document.getElementById('btnCompartirWA')?.addEventListener('click', () => compartirCuadritoWA(tiendaNombre, fecha, c));
  }
}

async function cerrarCajaAccion(tienda, fecha, esperado) {
  const efectivo = Number(document.getElementById('efectivoContado').value || '');
  const nota = document.getElementById('notaDiferencia')?.value.trim() || null;
  const err = document.getElementById('cierreErr');
  err.classList.remove('show');

  if (document.getElementById('efectivoContado').value === '') {
    err.textContent = 'Ingresa el efectivo contado.'; err.classList.add('show'); return;
  }
  const dif = efectivo - esperado;
  if (dif !== 0 && !nota) {
    err.textContent = 'La diferencia no es cero — agrega una nota explicando por qué.'; err.classList.add('show'); return;
  }
  if (!confirm('¿Confirmas el cierre de caja? No se puede cerrar dos veces el mismo día.')) return;

  const btn = document.getElementById('btnCerrarCaja');
  btn.disabled = true; btn.textContent = 'Cerrando...';

  const { data, error } = await sb.rpc('cerrar_caja', { p_tienda_codigo: tienda, p_fecha: fecha, p_efectivo_contado: efectivo, p_nota: nota });

  btn.disabled = false; btn.textContent = 'Cerrar caja';

  if (error) { err.textContent = 'No se pudo cerrar: ' + error.message; err.classList.add('show'); return; }

  mostrarBanner(`✅ Caja cerrada — Diferencia: ${fmtCOP(data.diferencia)}`);
  cargarCuadrito(tienda, fecha);
}

function compartirCuadritoWA(tiendaNombre, fecha, c) {
  const fechaFmt = new Date(fecha + 'T12:00:00').toLocaleDateString('es-CO');
  let texto = `*CAJA DIARIA — ${tiendaNombre} — ${fechaFmt}*\n\n`;
  texto += `*TELÉFONOS*\n`;
  texto += c.telefonos.length ? c.telefonos.map(t => `${t.nombre} (${t.tipo}) — ${t.tipo === 'credito' ? 'Inicial: ' : ''}${fmtCOP(t.monto)}`).join('\n') : 'Sin ventas.';
  texto += `\n\n*ACCESORIOS*\n`;
  texto += c.accesorios.length ? c.accesorios.map(a => `${a.nombre} ×${a.cantidad} — ${fmtCOP(a.total)}`).join('\n') : 'Sin ventas.';
  texto += `\n\n*CRÉDITOS*\n`;
  texto += c.creditosDelDia.length ? c.creditosDelDia.map(cr => `${cr.cliente} — ${cr.producto} — ${cr.financiera}\n  Inicial: ${fmtCOP(cr.inicial)} | Financiado: ${fmtCOP(cr.financiado)}`).join('\n') : 'Sin créditos.';
  texto += `\n\n*GASTOS*\n`;
  texto += c.gastos.length ? c.gastos.map(g => `${g.conceptos_gasto?.nombre} — ${fmtCOP(g.monto)}`).join('\n') : 'Sin gastos.';
  texto += `\n\n━━━━━━━━━━━━━\nTotal contado: ${fmtCOP(c.totalContado)}\nTotal iniciales: ${fmtCOP(c.totalIniciales)}\nTotal gastos: -${fmtCOP(c.totalGastos)}\n*EFECTIVO ESPERADO: ${fmtCOP(c.esperado)}*\nEfectivo contado: ${fmtCOP(c.caja.efectivo_contado)}\nDiferencia: ${fmtCOP(c.caja.diferencia)}`;

  navigator.clipboard?.writeText(texto).then(() => {
    alert('Cuadrito copiado al portapapeles. Se abrirá WhatsApp para pegarlo.');
  }).catch(() => {});
  window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
}

// ─── Vista central: consolidado ─────────────────────────────────────────
async function cargarTiendasYConsolidado() {
  const { data: tiendas } = await sb.from('origenes').select('codigo, nombre').eq('tipo', 'propia').eq('activo', true).order('nombre');
  tiendasCache = tiendas || [];
  document.getElementById('filtroTiendaCentral').innerHTML = '<option value="">Todas las tiendas</option>' + tiendasCache.map(t => `<option value="${t.codigo}">${escapeHtml(t.nombre)}</option>`).join('');
  cargarConsolidado();
}

function fechasEnRango(desde, hasta) {
  const fechas = [];
  let d = new Date(desde + 'T12:00:00');
  const h = new Date(hasta + 'T12:00:00');
  while (d <= h) {
    fechas.push(d.toISOString().slice(0, 10));
    d.setDate(d.getDate() + 1);
  }
  return fechas;
}

async function cargarConsolidado() {
  const empty = document.getElementById('emptyConsolidado');
  empty.style.display = 'block';
  empty.textContent = 'Cargando...';

  const tiendaFiltro = document.getElementById('filtroTiendaCentral').value;
  const desde = document.getElementById('fechaDesde').value;
  const hasta = document.getElementById('fechaHasta').value;
  if (!desde || !hasta) return;

  const tiendas = tiendaFiltro ? tiendasCache.filter(t => t.codigo === tiendaFiltro) : tiendasCache;
  const fechas = fechasEnRango(desde, hasta);

  const filas = [];
  for (const tienda of tiendas) {
    for (const fecha of fechas) {
      const c = await calcularCuadrito(tienda.codigo, fecha);
      const cerrada = c.caja && c.caja.estado === 'cerrada';
      filas.push({
        tiendaNombre: tienda.nombre, fecha,
        contado: c.totalContado, iniciales: c.totalIniciales, gastos: c.totalGastos, esperado: c.esperado,
        contadoReal: cerrada ? c.caja.efectivo_contado : null,
        diferencia: cerrada ? c.caja.diferencia : null,
        cerrada,
      });
    }
  }

  const tbody = document.getElementById('tbodyConsolidado');
  if (!filas.length) { tbody.innerHTML = ''; empty.style.display = 'block'; empty.textContent = 'Sin datos para este rango.'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = filas.map(f => `
    <tr class="${f.cerrada ? '' : 'fila-abierta'}">
      <td>${escapeHtml(f.tiendaNombre)}</td>
      <td>${new Date(f.fecha + 'T12:00:00').toLocaleDateString('es-CO')}</td>
      <td>${fmtCOP(f.contado)}</td>
      <td>${fmtCOP(f.iniciales)}</td>
      <td>${fmtCOP(f.gastos)}</td>
      <td>${fmtCOP(f.esperado)}</td>
      <td>${f.contadoReal !== null ? fmtCOP(f.contadoReal) : '—'}</td>
      <td>${f.diferencia !== null ? fmtCOP(f.diferencia) : '—'}</td>
      <td><span class="badge ${f.cerrada ? 'cerrada' : 'abierta'}">${f.cerrada ? 'Cerrada ✓' : 'Abierta'}</span></td>
    </tr>
  `).join('');
}
</script>
