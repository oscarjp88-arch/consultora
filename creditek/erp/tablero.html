<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creditek · Tablero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="sidebar.js"></script>
<style>
:root {
  --azul: #0B1E3D; --turquesa: #00C4CC; --bg: #F5F5F7; --surface: #FFFFFF;
  --border: rgba(11,30,61,0.08); --text2: #6E6E76; --verde: #16A34A; --amarillo: #D97706; --rojo: #DC2626;
  --radius: 18px; --radius-sm: 11px;
  --shadow-sm: 0 1px 2px rgba(11,30,61,0.04), 0 1px 1px rgba(11,30,61,0.03);
  --shadow-md: 0 12px 28px -10px rgba(11,30,61,0.16);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--azul); -webkit-font-smoothing: antialiased; }

.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle at 30% 20%, #EAFBFC 0%, var(--bg) 55%); }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 40px 32px; width: 100%; max-width: 360px; box-shadow: var(--shadow-md); }
.login-box img.logo { display: block; height: 40px; margin: 0 auto 22px; object-fit: contain; }
.login-box input { width: 100%; border: 1px solid transparent; background: var(--bg); border-radius: var(--radius-sm); padding: 13px 14px; font-size: 15px; margin-bottom: 12px; font-family: inherit; transition: all .15s ease; }
.login-box input:focus { outline: none; background: white; border-color: var(--turquesa); box-shadow: 0 0 0 4px rgba(0,196,204,0.14); }
.login-box button { width: 100%; background: var(--turquesa); color: white; border: none; border-radius: var(--radius-sm); padding: 13px; font-size: 14.5px; font-weight: 700; cursor: pointer; margin-top: 6px; box-shadow: 0 6px 16px -4px rgba(0,196,204,0.5); transition: transform .12s ease, box-shadow .12s ease; }
.login-box button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 20px -4px rgba(0,196,204,0.55); }
.login-box button:disabled { background: #D2D2D7; box-shadow: none; }
.login-err { color: var(--rojo); font-size: 12.5px; margin-top: 10px; display: none; }
.login-err.show { display: block; }

.sin-perfil-screen { min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 20px; text-align: center; }
.sin-perfil-screen.show { display: flex; }
.sin-perfil-box { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 40px 32px; max-width: 380px; box-shadow: var(--shadow-md); }
.sin-perfil-box .icono { font-size: 34px; margin-bottom: 12px; }
.sin-perfil-box h2 { font-family: 'Montserrat', sans-serif; font-size: 17px; margin-bottom: 8px; }
.sin-perfil-box p { font-size: 13.5px; color: var(--text2); line-height: 1.5; margin-bottom: 18px; }
.sin-perfil-box button { border: 1px solid var(--border); background: var(--bg); border-radius: var(--radius-sm); padding: 10px 18px; font-size: 13px; cursor: pointer; color: var(--azul); font-weight: 600; }

#app { display: none; }
#app.show { display: flex; }

.page { max-width: 1280px; margin: 0 auto; padding: 32px 24px 60px; }
.page-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
.page-top h1 { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
.page-top .fecha { font-size: 13px; color: var(--text2); }
.acceso-negado { text-align: center; padding: 80px 20px; color: var(--text2); }
.acceso-negado .icono { font-size: 34px; margin-bottom: 12px; }

.filtros { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 22px; }
.campo { margin-bottom: 0; }
.campo label { display: block; font-size: 11.5px; color: var(--text2); margin-bottom: 5px; font-weight: 600; }
.campo select, .campo input { border: 1px solid var(--border); background: var(--surface); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; font-family: inherit; }

.kpis { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 16px; margin-bottom: 26px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); }
.kpi-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text2); margin-bottom: 10px; }
.kpi-valor { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 25px; }
.kpi-var { font-size: 12px; margin-top: 6px; font-weight: 700; }
.kpi-var.up { color: var(--verde); }
.kpi-var.down { color: var(--rojo); }
.kpi-var.flat { color: var(--text2); }

.seccion { margin-bottom: 28px; }
.seccion h2 { font-family: 'Montserrat', sans-serif; font-size: 15.5px; margin-bottom: 12px; }

.tabla-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 11px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
th { background: rgba(11,30,61,0.02); font-size: 10.5px; text-transform: uppercase; letter-spacing: .03em; color: var(--text2); font-weight: 700; }
tr:last-child td { border-bottom: none; }
tr.fila-total td { font-weight: 800; background: rgba(11,30,61,0.03); }
td.num, th.num { text-align: right; }
td.centro, th.centro { text-align: center; }
.barra-pct { width: 90px; height: 7px; border-radius: 999px; background: var(--bg); overflow: hidden; display: inline-block; vertical-align: middle; margin-right: 6px; }
.barra-pct div { height: 100%; }
.empty-state { text-align: center; color: var(--text2); font-size: 14px; padding: 40px 0; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; margin-bottom: 22px; box-shadow: var(--shadow-sm); }
.grafico-box { height: 320px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

.alertas-lista { display: flex; flex-direction: column; gap: 8px; }
.alerta { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; }
.alerta.roja { background: #FEE2E2; color: #991B1B; }
.alerta.amarilla { background: #FEF3C7; color: #92400E; }
.alerta .icono { font-size: 15px; flex-shrink: 0; }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <img class="logo" src="/creditek/agentes/logos/creditek_logo_corregido_alta.png" alt="Creditek">
    <input type="email" id="loginEmail" placeholder="Correo" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password">
    <button id="btnLogin">Entrar</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div class="sin-perfil-screen" id="sinPerfilScreen">
  <div class="sin-perfil-box">
    <div class="icono">🔒</div>
    <h2>Sin perfil asignado</h2>
    <p>Tu usuario no tiene perfil asignado. Contacta al administrador.</p>
    <button id="btnSalirSinPerfil">Cerrar sesión</button>
  </div>
</div>

<div id="app">
  <div style="display:none;" aria-hidden="true">
    <b id="navNombre"></b><span id="navRolTienda"></span><button id="btnLogout"></button>
  </div>
  <div class="main-content">
  <div class="page" id="pageContenido"></div>
  </div>
</div>

<template id="tplAccesoNegado">
  <div class="acceso-negado">
    <div class="icono">🔒</div>
    <h2>Solo gerencia o auditoría</h2>
    <p>El tablero gerencial no está disponible para roles de tienda.</p>
  </div>
</template>

<template id="tplTablero">
  <div class="page-top">
    <h1>Tablero Creditek</h1>
    <div class="fecha" id="fechaHoy"></div>
  </div>

  <div class="filtros">
    <div class="campo">
      <label>Periodo (KPIs superiores)</label>
      <select id="filtroPeriodo">
        <option value="hoy">Hoy</option>
        <option value="semana">Esta semana</option>
        <option value="mes">Este mes</option>
        <option value="rango">Rango personalizado</option>
      </select>
    </div>
    <div class="campo" id="campoRangoDesde" style="display:none;"><label>Desde</label><input type="date" id="rangoDesde"></div>
    <div class="campo" id="campoRangoHasta" style="display:none;"><label>Hasta</label><input type="date" id="rangoHasta"></div>
    <div class="campo">
      <label>Tienda</label>
      <select id="filtroTienda"><option value="">Consolidado (todas)</option></select>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi-card">
      <div class="kpi-label">💰 Ventas</div>
      <div class="kpi-valor" id="kpiVentas">—</div>
      <div class="kpi-var" id="kpiVentasVar"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">💳 Créditos</div>
      <div class="kpi-valor" id="kpiCreditos">—</div>
      <div class="kpi-var" id="kpiCreditosVar"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">📈 Utilidad</div>
      <div class="kpi-valor" id="kpiUtilidad">—</div>
      <div class="kpi-var" id="kpiUtilidadVar"></div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">✅ Clientes pendientes</div>
      <div class="kpi-valor" id="kpiPendientes">—</div>
      <div class="kpi-var flat">a validar</div>
    </div>
  </div>

  <div class="seccion">
    <h2>Tiendas — cumplimiento del mes</h2>
    <div class="tabla-wrap">
      <table>
        <thead><tr>
          <th>Tienda</th><th class="num">Créd. mes</th><th class="num">Meta</th><th class="centro">%</th>
          <th class="num">Run-rate</th><th class="num">Contado ($)</th><th class="num">Utilidad ($)</th>
          <th class="centro">Caja</th><th class="centro">Sem.</th>
        </tr></thead>
        <tbody id="tbodyTiendas"></tbody>
        <tfoot id="tfootTotal"></tfoot>
      </table>
      <div class="empty-state" id="emptyTiendas" style="display:none;"></div>
    </div>
  </div>

  <div class="seccion">
    <h2>Alertas</h2>
    <div class="alertas-lista" id="listaAlertas"></div>
  </div>

  <div class="grid-2 seccion">
    <div class="card">
      <h2 style="margin-bottom:14px;">Créditos por tienda vs meta</h2>
      <div class="grafico-box"><canvas id="chartCreditos"></canvas></div>
    </div>
    <div class="card">
      <h2 style="margin-bottom:14px;">Utilidad acumulada del mes vs presupuesto</h2>
      <div class="grafico-box"><canvas id="chartUtilidad"></canvas></div>
    </div>
  </div>

  <div class="seccion" id="ejecutivos">
    <h2>Ejecutivos</h2>
    <div class="tabla-wrap">
      <table>
        <thead><tr><th>Ejecutivo</th><th class="num">Aliadas activas</th><th class="num">Créditos del mes</th><th>Comisión estimada</th></tr></thead>
        <tbody id="tbodyEjecutivos"></tbody>
      </table>
      <div class="empty-state" id="emptyEjecutivos" style="display:none;">No hay ejecutivos registrados.</div>
    </div>
  </div>
</template>

<script>
const SUPABASE_URL = 'https://jfkmiyvcdfbsbwchyvol.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impma21peXZjZGZic2J3Y2h5dm9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMzA5NjgsImV4cCI6MjA5OTcwNjk2OH0.kpAjGLbDnycU-B1kc-AqOvj6X2xH-KHBiKB94V7prcQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentPerfil = null;
let tiendasCache = [];
let chartCreditosObj = null;
let chartUtilidadObj = null;

function esCentral() { return !!currentPerfil && (currentPerfil.rol === 'gerencia' || currentPerfil.rol === 'auditoria'); }

document.getElementById('btnLogin').addEventListener('click', hacerLogin);
document.getElementById('loginPass').addEventListener('keydown', (e) => { if (e.key === 'Enter') hacerLogin(); });

async function hacerLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('loginErr');
  err.classList.remove('show');
  if (!email || !password) return;
  btn.disabled = true; btn.textContent = 'Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Entrar';
  if (error) { err.textContent = 'Correo o contraseña incorrectos.'; err.classList.add('show'); return; }
  entrarApp(data.user);
}

document.getElementById('btnLogout').addEventListener('click', cerrarSesion);
document.getElementById('btnSalirSinPerfil').addEventListener('click', cerrarSesion);
async function cerrarSesion() { await sb.auth.signOut(); location.reload(); }

async function entrarApp(user) {
  currentUser = user;
  const { data: perfil, error } = await sb.from('perfiles').select('*').eq('id', user.id).maybeSingle();
  if (error || !perfil || !perfil.activo) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('sinPerfilScreen').classList.add('show');
    return;
  }
  currentPerfil = perfil;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  pintarNavUser();
  initPagina();
}

function pintarNavUser() {
  document.getElementById('navNombre').textContent = currentPerfil.nombre || currentUser.email;
  const rolLabel = { gerencia: 'Gerencia', auditoria: 'Auditoría', admin_tienda: 'Admin tienda', asesor: 'Asesor' }[currentPerfil.rol] || currentPerfil.rol;
  document.getElementById('navRolTienda').textContent = currentPerfil.tienda_codigo ? `${rolLabel} · ${currentPerfil.tienda_codigo}` : rolLabel;
}

sb.auth.getSession().then(({ data }) => { if (data.session) entrarApp(data.session.user); });

function fmtCOP(n) { return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n || 0); }
function fmtCorto(n) {
  n = Number(n || 0);
  if (Math.abs(n) >= 1000000) return '$' + (n / 1000000).toFixed(1) + 'M';
  if (Math.abs(n) >= 1000) return '$' + Math.round(n / 1000) + 'K';
  return fmtCOP(n);
}
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function hoyISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function fechaISO(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }

function initPagina() {
  if (!esCentral()) {
    document.getElementById('pageContenido').innerHTML = '';
    document.getElementById('pageContenido').appendChild(document.getElementById('tplAccesoNegado').content.cloneNode(true));
    return;
  }
  const cont = document.getElementById('pageContenido');
  cont.innerHTML = '';
  cont.appendChild(document.getElementById('tplTablero').content.cloneNode(true));

  document.getElementById('fechaHoy').textContent = new Date().toLocaleDateString('es-CO', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('filtroPeriodo').addEventListener('change', onCambioFiltro);
  document.getElementById('rangoDesde').addEventListener('change', cargarKPIs);
  document.getElementById('rangoHasta').addEventListener('change', cargarKPIs);
  document.getElementById('filtroTienda').addEventListener('change', () => { cargarKPIs(); cargarTiendas_Tabla(); });

  cargarTiendasSelect().then(() => {
    cargarKPIs();
    cargarTiendas_Tabla();
    cargarEjecutivos();
  });
}

function onCambioFiltro() {
  const periodo = document.getElementById('filtroPeriodo').value;
  document.getElementById('campoRangoDesde').style.display = periodo === 'rango' ? 'block' : 'none';
  document.getElementById('campoRangoHasta').style.display = periodo === 'rango' ? 'block' : 'none';
  if (periodo !== 'rango') cargarKPIs();
}

async function cargarTiendasSelect() {
  const { data } = await sb.from('origenes').select('codigo, nombre').eq('tipo', 'propia').eq('activo', true).order('nombre');
  tiendasCache = data || [];
  document.getElementById('filtroTienda').innerHTML = '<option value="">Consolidado (todas)</option>' +
    tiendasCache.map(t => `<option value="${t.codigo}">${escapeHtml(t.nombre)}</option>`).join('');
}

function nombreTienda(codigo) { return tiendasCache.find(t => t.codigo === codigo)?.nombre || codigo; }

function rangoSeleccionado() {
  const periodo = document.getElementById('filtroPeriodo').value;
  const hoy = new Date();
  if (periodo === 'hoy') { const s = hoyISO(); return { desde: s, hasta: s }; }
  if (periodo === 'semana') {
    const diaSemana = hoy.getDay() === 0 ? 7 : hoy.getDay(); // lunes=1..domingo=7
    const inicio = new Date(hoy); inicio.setDate(hoy.getDate() - (diaSemana - 1));
    return { desde: fechaISO(inicio), hasta: hoyISO() };
  }
  if (periodo === 'mes') {
    const inicio = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
    return { desde: fechaISO(inicio), hasta: hoyISO() };
  }
  const desde = document.getElementById('rangoDesde').value || hoyISO();
  const hasta = document.getElementById('rangoHasta').value || hoyISO();
  return { desde, hasta };
}

// Punto de comparación: mismo rango, desplazado 7 días atrás (mismo día de la semana)
function rangoComparacion(rango) {
  const desplazar = (s) => { const d = new Date(s + 'T00:00:00'); d.setDate(d.getDate() - 7); return fechaISO(d); };
  return { desde: desplazar(rango.desde), hasta: desplazar(rango.hasta) };
}

async function sumVentasCreditosUtilidad(desde, hasta, tienda) {
  let qv = sb.from('ventas').select('id, total, tipo').gte('fecha', desde).lte('fecha', hasta).eq('anulada', false);
  if (tienda) qv = qv.eq('tienda_codigo', tienda);
  const { data: ventas } = await qv;
  const ids = (ventas || []).map(v => v.id);
  const totalVentas = (ventas || []).reduce((s, v) => s + Number(v.total || 0), 0);
  const totalCreditos = (ventas || []).filter(v => v.tipo === 'credito').length;

  let totalUtilidad = 0;
  if (ids.length) {
    const { data: items } = await sb.from('venta_items').select('utilidad, venta_id').in('venta_id', ids);
    totalUtilidad = (items || []).reduce((s, i) => s + Number(i.utilidad || 0), 0);
  }
  return { ventas: totalVentas, creditos: totalCreditos, utilidad: totalUtilidad };
}

function pintarVariacion(elId, actual, anterior) {
  const el = document.getElementById(elId);
  if (!anterior) { el.textContent = actual ? 'nuevo' : '—'; el.className = 'kpi-var flat'; return; }
  const pct = ((actual - anterior) / anterior) * 100;
  const flecha = pct > 0 ? '▲' : pct < 0 ? '▼' : '—';
  el.textContent = `${flecha} ${Math.abs(pct).toFixed(0)}% vs. misma semana pasada`;
  el.className = 'kpi-var ' + (pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat');
}

async function cargarKPIs() {
  const tienda = document.getElementById('filtroTienda').value;
  const rango = rangoSeleccionado();
  const comp = rangoComparacion(rango);

  const [actual, anterior] = await Promise.all([
    sumVentasCreditosUtilidad(rango.desde, rango.hasta, tienda),
    sumVentasCreditosUtilidad(comp.desde, comp.hasta, tienda),
  ]);

  document.getElementById('kpiVentas').textContent = fmtCOP(actual.ventas);
  pintarVariacion('kpiVentasVar', actual.ventas, anterior.ventas);
  document.getElementById('kpiCreditos').textContent = `${actual.creditos} uds`;
  pintarVariacion('kpiCreditosVar', actual.creditos, anterior.creditos);
  document.getElementById('kpiUtilidad').textContent = fmtCOP(actual.utilidad);
  pintarVariacion('kpiUtilidadVar', actual.utilidad, anterior.utilidad);

  let qp = sb.from('solicitudes').select('id', { count: 'exact', head: true }).eq('estado_validacion', 'pendiente');
  const { count } = await qp;
  document.getElementById('kpiPendientes').textContent = `${count ?? 0}`;
}

// ─── Tabla de tiendas: cumplimiento del mes ──────────────────────────────
async function cargarTiendas_Tabla() {
  const tiendaFiltro = document.getElementById('filtroTienda').value;
  const hoy = new Date();
  const inicioMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
  const finMes = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 1);
  const inicioMesStr = fechaISO(inicioMes);
  const finMesStr = fechaISO(finMes);
  const diasTranscurridos = hoy.getDate();
  const diasDelMes = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0).getDate();

  const tiendas = tiendaFiltro ? tiendasCache.filter(t => t.codigo === tiendaFiltro) : tiendasCache;

  const { data: ventasMes } = await sb.from('ventas').select('id, tienda_codigo, tipo, total, fecha').gte('fecha', inicioMesStr).lt('fecha', finMesStr).eq('anulada', false);
  const idsVentas = (ventasMes || []).map(v => v.id);
  let itemsMes = [];
  if (idsVentas.length) {
    const { data } = await sb.from('venta_items').select('venta_id, utilidad').in('venta_id', idsVentas);
    itemsMes = data || [];
  }
  const { data: presupuestoMes } = await sb.from('presupuestos').select('tienda_codigo, meta_creditos').gte('fecha', inicioMesStr).lt('fecha', finMesStr);
  const { data: cajasMes } = await sb.from('caja_diaria').select('tienda_codigo, fecha, estado').gte('fecha', inicioMesStr).lt('fecha', finMesStr);

  const utilidadPorVenta = {};
  itemsMes.forEach(i => { utilidadPorVenta[i.venta_id] = (utilidadPorVenta[i.venta_id] || 0) + Number(i.utilidad || 0); });

  const filas = tiendas.map(t => {
    const ventasTienda = (ventasMes || []).filter(v => v.tienda_codigo === t.codigo);
    const creditosMes = ventasTienda.filter(v => v.tipo === 'credito').length;
    const contadoMes = ventasTienda.filter(v => v.tipo === 'contado').reduce((s, v) => s + Number(v.total || 0), 0);
    const utilidadMes = ventasTienda.reduce((s, v) => s + (utilidadPorVenta[v.id] || 0), 0);
    const metaMes = (presupuestoMes || []).filter(p => p.tienda_codigo === t.codigo).reduce((s, p) => s + Number(p.meta_creditos || 0), 0);
    const pct = metaMes > 0 ? (creditosMes / metaMes) * 100 : null;
    const runRate = (creditosMes / diasTranscurridos) * diasDelMes;
    const pctRunRate = metaMes > 0 ? (runRate / metaMes) * 100 : null;

    // Caja: ¿hay algún día ANTERIOR a hoy con ventas/gastos y sin caja cerrada?
    const diasConVenta = new Set(ventasTienda.map(v => v.fecha).filter(f => f < hoyISO()));
    const cajasTienda = (cajasMes || []).filter(c => c.tienda_codigo === t.codigo);
    let cajaOk = true;
    diasConVenta.forEach(f => {
      const cerrada = cajasTienda.some(c => c.fecha === f && c.estado === 'cerrada');
      if (!cerrada) cajaOk = false;
    });

    let semaforo = '⚪';
    if (pctRunRate !== null) semaforo = pctRunRate >= 90 ? '🟢' : pctRunRate >= 70 ? '🟡' : '🔴';

    return { tienda: t, creditosMes, metaMes, pct, runRate, contadoMes, utilidadMes, cajaOk, semaforo, pctRunRate };
  });

  renderTablaTiendas(filas);
  dibujarGraficos(filas, inicioMes, diasDelMes, hoy.getDate(), tiendaFiltro);
  calcularAlertas(filas, ventasMes, hoy);
}

function renderTablaTiendas(filas) {
  const tbody = document.getElementById('tbodyTiendas');
  const empty = document.getElementById('emptyTiendas');
  if (!filas.length) { tbody.innerHTML = ''; empty.style.display = 'block'; empty.textContent = 'No hay tiendas para mostrar.'; document.getElementById('tfootTotal').innerHTML = ''; return; }
  empty.style.display = 'none';

  const colorBarra = (pct) => pct === null ? '#D2D2D7' : pct >= 90 ? 'var(--verde)' : pct >= 70 ? 'var(--amarillo)' : 'var(--rojo)';

  tbody.innerHTML = filas.map(f => `
    <tr>
      <td>${escapeHtml(f.tienda.nombre)}</td>
      <td class="num">${f.creditosMes}</td>
      <td class="num">${f.metaMes || '—'}</td>
      <td class="centro">
        <span class="barra-pct"><div style="width:${Math.min(f.pct || 0, 100)}%; background:${colorBarra(f.pct)};"></div></span>
        ${f.pct === null ? '—' : Math.round(f.pct) + '%'}
      </td>
      <td class="num">${Math.round(f.runRate)}</td>
      <td class="num">${fmtCorto(f.contadoMes)}</td>
      <td class="num">${fmtCorto(f.utilidadMes)}</td>
      <td class="centro">${f.cajaOk ? '✅' : '⚠️'}</td>
      <td class="centro">${f.semaforo}</td>
    </tr>
  `).join('');

  const totalCreditos = filas.reduce((s, f) => s + f.creditosMes, 0);
  const totalMeta = filas.reduce((s, f) => s + f.metaMes, 0);
  const totalContado = filas.reduce((s, f) => s + f.contadoMes, 0);
  const totalUtilidad = filas.reduce((s, f) => s + f.utilidadMes, 0);
  const totalPct = totalMeta > 0 ? Math.round((totalCreditos / totalMeta) * 100) : 0;
  document.getElementById('tfootTotal').innerHTML = `
    <tr class="fila-total">
      <td>TOTAL</td><td class="num">${totalCreditos}</td><td class="num">${totalMeta}</td>
      <td class="centro">${totalPct}%</td><td class="num">—</td>
      <td class="num">${fmtCorto(totalContado)}</td><td class="num">${fmtCorto(totalUtilidad)}</td>
      <td class="centro">—</td><td class="centro">—</td>
    </tr>
  `;
}

// ─── Gráficos ─────────────────────────────────────────────────────────────
function dibujarGraficos(filas, inicioMes, diasDelMes, diasTranscurridos, tiendaFiltro) {
  const ctx1 = document.getElementById('chartCreditos');
  if (chartCreditosObj) chartCreditosObj.destroy();
  chartCreditosObj = new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: filas.map(f => f.tienda.nombre),
      datasets: [
        { label: 'Logrado', data: filas.map(f => f.creditosMes), backgroundColor: '#00C4CC', stack: 's' },
        { label: 'Faltante', data: filas.map(f => Math.max((f.metaMes || 0) - f.creditosMes, 0)), backgroundColor: '#E2E8F0', stack: 's' },
      ],
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } } },
  });

  // Utilidad acumulada del mes (real) vs presupuesto acumulado, para la tienda filtrada o consolidado
  cargarSerieUtilidadAcumulada(inicioMes, diasDelMes, diasTranscurridos, tiendaFiltro);
}

async function cargarSerieUtilidadAcumulada(inicioMes, diasDelMes, diasTranscurridos, tiendaFiltro) {
  const inicioStr = fechaISO(inicioMes);
  const finStr = fechaISO(new Date(inicioMes.getFullYear(), inicioMes.getMonth() + 1, 1));

  let qv = sb.from('ventas').select('id, fecha').gte('fecha', inicioStr).lt('fecha', finStr).eq('anulada', false);
  if (tiendaFiltro) qv = qv.eq('tienda_codigo', tiendaFiltro);
  const { data: ventas } = await qv;
  const idsVentas = (ventas || []).map(v => v.id);
  let items = [];
  if (idsVentas.length) {
    const { data } = await sb.from('venta_items').select('venta_id, utilidad').in('venta_id', idsVentas);
    items = data || [];
  }
  const utilidadPorVenta = {};
  items.forEach(i => { utilidadPorVenta[i.venta_id] = (utilidadPorVenta[i.venta_id] || 0) + Number(i.utilidad || 0); });
  const utilidadPorDia = {};
  (ventas || []).forEach(v => { utilidadPorDia[v.fecha] = (utilidadPorDia[v.fecha] || 0) + (utilidadPorVenta[v.id] || 0); });

  let qp = sb.from('presupuestos').select('fecha, meta_utilidad').gte('fecha', inicioStr).lt('fecha', finStr);
  if (tiendaFiltro) qp = qp.eq('tienda_codigo', tiendaFiltro);
  const { data: presupuestos } = await qp;
  const metaPorDia = {};
  (presupuestos || []).forEach(p => { metaPorDia[p.fecha] = (metaPorDia[p.fecha] || 0) + Number(p.meta_utilidad || 0); });

  const labels = []; const real = []; const meta = [];
  let acumReal = 0, acumMeta = 0;
  for (let d = 1; d <= diasDelMes; d++) {
    const fecha = new Date(inicioMes.getFullYear(), inicioMes.getMonth(), d);
    const fechaStr = fechaISO(fecha);
    labels.push(d);
    if (d <= diasTranscurridos) { acumReal += utilidadPorDia[fechaStr] || 0; real.push(acumReal); }
    else real.push(null);
    acumMeta += metaPorDia[fechaStr] || 0;
    meta.push(acumMeta);
  }

  const ctx2 = document.getElementById('chartUtilidad');
  if (chartUtilidadObj) chartUtilidadObj.destroy();
  chartUtilidadObj = new Chart(ctx2, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Utilidad real (acumulada)', data: real, borderColor: '#00C4CC', backgroundColor: 'rgba(0,196,204,0.1)', tension: 0.25, spanGaps: false },
        { label: 'Presupuesto (acumulado)', data: meta, borderColor: '#0B1E3D', borderDash: [5, 4], tension: 0.25 },
      ],
    },
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { ticks: { callback: v => fmtCorto(v) } } } },
  });
}

// ─── Alertas ───────────────────────────────────────────────────────────
async function calcularAlertas(filas, ventasMes, hoy) {
  const alertas = [];
  const ayerStr = fechaISO(new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate() - 1));

  // 🔴 Cajas de ayer sin cerrar (solo tiendas con actividad ayer)
  const { data: ventasAyer } = await sb.from('ventas').select('tienda_codigo').eq('fecha', ayerStr).eq('anulada', false);
  const { data: gastosAyer } = await sb.from('gastos').select('tienda_codigo').eq('fecha', ayerStr);
  const tiendasConActividadAyer = new Set([...(ventasAyer || []).map(v => v.tienda_codigo), ...(gastosAyer || []).map(g => g.tienda_codigo)]);
  const { data: cajasAyer } = await sb.from('caja_diaria').select('tienda_codigo, estado').eq('fecha', ayerStr);
  tiendasConActividadAyer.forEach(codigo => {
    const cerrada = (cajasAyer || []).some(c => c.tienda_codigo === codigo && c.estado === 'cerrada');
    if (!cerrada) alertas.push({ nivel: 'roja', texto: `${nombreTienda(codigo)}: caja de ayer sin cerrar` });
  });

  // 🔴 Clientes pendientes de validación > 24h
  const hace24h = new Date(Date.now() - 24 * 3600 * 1000).toISOString();
  const { count: pendientes24h } = await sb.from('solicitudes').select('id', { count: 'exact', head: true }).eq('estado_validacion', 'pendiente').lt('created_at', hace24h);
  if (pendientes24h > 0) alertas.push({ nivel: 'roja', texto: `${pendientes24h} cliente(s) pendientes de validación hace más de 24h` });

  // 🔴 Tiendas con 0 ventas hoy (después de mediodía)
  if (hoy.getHours() >= 12) {
    const hoyStr = hoyISO();
    filas.forEach(f => {
      const tuvoVentaHoy = (ventasMes || []).some(v => v.tienda_codigo === f.tienda.codigo && v.fecha === hoyStr);
      if (!tuvoVentaHoy) alertas.push({ nivel: 'roja', texto: `${f.tienda.nombre}: 0 ventas hoy` });
    });
  }

  // 🟡 Stock bajo (< 3 unidades)
  const { data: stockBajo } = await sb.from('stock_cantidad').select('tienda_codigo, cantidad, productos(nombre)').lt('cantidad', 3);
  (stockBajo || []).slice(0, 8).forEach(s => {
    alertas.push({ nivel: 'amarilla', texto: `${nombreTienda(s.tienda_codigo)}: stock de ${s.productos?.nombre || '—'} en ${s.cantidad} unidad(es)` });
  });

  // 🟡 Créditos sin conciliar (simplificado: total pendiente, no solo el último corte —
  // el spec habla del "último corte" pero un crédito pendiente sigue siendo relevante
  // aunque no sea del corte más reciente, así que se muestra el total global)
  const { count: pendientesConciliar } = await sb.from('creditos').select('id', { count: 'exact', head: true }).eq('estado_conciliacion', 'pendiente');
  if (pendientesConciliar > 0) alertas.push({ nivel: 'amarilla', texto: `${pendientesConciliar} crédito(s) sin conciliar con la financiera` });

  // 🟡 Abonos sin verificar
  const { count: abonosSinVerificar } = await sb.from('abonos').select('id', { count: 'exact', head: true }).is('verificado_at', null);
  if (abonosSinVerificar > 0) alertas.push({ nivel: 'amarilla', texto: `${abonosSinVerificar} abono(s) sin verificar` });

  renderAlertas(alertas);
}

function renderAlertas(alertas) {
  const cont = document.getElementById('listaAlertas');
  if (!alertas.length) { cont.innerHTML = '<div class="alerta amarilla" style="background:#DCFCE7;color:#166534;"><span class="icono">✅</span>Sin alertas activas.</div>'; return; }
  const orden = { roja: 0, amarilla: 1 };
  alertas.sort((a, b) => orden[a.nivel] - orden[b.nivel]);
  cont.innerHTML = alertas.map(a => `<div class="alerta ${a.nivel}"><span class="icono">${a.nivel === 'roja' ? '🔴' : '🟡'}</span>${escapeHtml(a.texto)}</div>`).join('');
}

// ─── Ejecutivos ────────────────────────────────────────────────────────
async function cargarEjecutivos() {
  const { data: ejecutivos } = await sb.from('ejecutivos').select('*').eq('activo', true).order('nombre');
  const { data: aliadas } = await sb.from('origenes').select('codigo, ejecutivo_id, activo').eq('tipo', 'aliado');
  const hoy = new Date();
  const inicioMes = fechaISO(new Date(hoy.getFullYear(), hoy.getMonth(), 1));
  const finMes = fechaISO(new Date(hoy.getFullYear(), hoy.getMonth() + 1, 1));
  const codigosAliadas = (aliadas || []).map(a => a.codigo);
  let ventasAliadas = [];
  if (codigosAliadas.length) {
    const { data } = await sb.from('ventas').select('tienda_codigo, tipo, fecha').in('tienda_codigo', codigosAliadas).gte('fecha', inicioMes).lt('fecha', finMes).eq('anulada', false).eq('tipo', 'credito');
    ventasAliadas = data || [];
  }

  const tbody = document.getElementById('tbodyEjecutivos');
  const empty = document.getElementById('emptyEjecutivos');
  if (!ejecutivos || !ejecutivos.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  tbody.innerHTML = ejecutivos.map(e => {
    const susAliadas = (aliadas || []).filter(a => a.ejecutivo_id === e.id);
    const activas = susAliadas.filter(a => a.activo).length;
    const codigos = susAliadas.map(a => a.codigo);
    const creditosMes = ventasAliadas.filter(v => codigos.includes(v.tienda_codigo)).length;
    const comision = e.esquema_comision ? 'Ver esquema' : 'Pendiente esquema';
    return `<tr><td>${escapeHtml(e.nombre)}</td><td class="num">${activas}</td><td class="num">${creditosMes} créditos</td><td>${comision}</td></tr>`;
  }).join('');
}
