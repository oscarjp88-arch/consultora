<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creditek · Cuenta Corriente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="sidebar.js"></script>
<style>
:root {
  --azul: #0B1E3D; --turquesa: #00C4CC; --bg: #F5F5F7; --surface: #FFFFFF;
  --border: rgba(11,30,61,0.08); --text2: #6E6E76; --verde: #16A34A; --amarillo: #D97706; --rojo: #DC2626;
  --radius: 18px; --radius-sm: 11px;
  --shadow-sm: 0 1px 2px rgba(11,30,61,0.04), 0 1px 1px rgba(11,30,61,0.03);
  --shadow-md: 0 12px 28px -10px rgba(11,30,61,0.16);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--azul); -webkit-font-smoothing: antialiased; }

.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle at 30% 20%, #EAFBFC 0%, var(--bg) 55%); }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 40px 32px; width: 100%; max-width: 360px; box-shadow: var(--shadow-md); }
.login-box img.logo { display: block; height: 40px; margin: 0 auto 22px; object-fit: contain; }
.login-box input { width: 100%; border: 1px solid transparent; background: var(--bg); border-radius: var(--radius-sm); padding: 13px 14px; font-size: 15px; margin-bottom: 12px; font-family: inherit; transition: all .15s ease; }
.login-box input:focus { outline: none; background: white; border-color: var(--turquesa); box-shadow: 0 0 0 4px rgba(0,196,204,0.14); }
.login-box button { width: 100%; background: var(--turquesa); color: white; border: none; border-radius: var(--radius-sm); padding: 13px; font-size: 14.5px; font-weight: 700; cursor: pointer; margin-top: 6px; box-shadow: 0 6px 16px -4px rgba(0,196,204,0.5); transition: transform .12s ease, box-shadow .12s ease; }
.login-box button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 20px -4px rgba(0,196,204,0.55); }
.login-box button:disabled { background: #D2D2D7; box-shadow: none; }
.login-err { color: var(--rojo); font-size: 12.5px; margin-top: 10px; display: none; }
.login-err.show { display: block; }

.sin-perfil-screen { min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 20px; text-align: center; }
.sin-perfil-screen.show { display: flex; }
.sin-perfil-box { background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 40px 32px; max-width: 380px; box-shadow: var(--shadow-md); }
.sin-perfil-box .icono { font-size: 34px; margin-bottom: 12px; }
.sin-perfil-box h2 { font-family: 'Montserrat', sans-serif; font-size: 17px; margin-bottom: 8px; }
.sin-perfil-box p { font-size: 13.5px; color: var(--text2); line-height: 1.5; margin-bottom: 18px; }
.sin-perfil-box button { border: 1px solid var(--border); background: var(--bg); border-radius: var(--radius-sm); padding: 10px 18px; font-size: 13px; cursor: pointer; color: var(--azul); font-weight: 600; }

#app { display: none; }
#app.show { display: flex; }
.navbar { background: rgba(255,255,255,0.72); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 18px; position: sticky; top: 0; z-index: 10; flex-wrap: wrap; }
.navbar img.logo { height: 26px; object-fit: contain; flex-shrink: 0; }
.nav-links { display: flex; gap: 4px; overflow-x: auto; flex: 1; scrollbar-width: none; }
.nav-links::-webkit-scrollbar { display: none; }
.nav-links a { white-space: nowrap; text-decoration: none; color: var(--text2); font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 999px; transition: background .15s ease, color .15s ease; }
.nav-links a:hover { background: rgba(11,30,61,0.05); color: var(--azul); }
.nav-links a.active { background: var(--azul); color: white; box-shadow: var(--shadow-sm); }
.nav-user { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text2); flex-shrink: 0; }
.nav-user .quien { text-align: right; line-height: 1.3; }
.nav-user .quien b { color: var(--azul); font-size: 12.5px; }
.nav-user button { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 7px 14px; font-size: 12px; cursor: pointer; color: var(--text2); font-weight: 600; transition: background .15s ease; }
.nav-user button:hover { background: #EAEAEC; }

.page { max-width: 1100px; margin: 0 auto; padding: 32px 24px 60px; }
.page-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
.page-top h1 { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
.btn-primary { background: var(--turquesa); color: white; border: none; border-radius: 999px; padding: 11px 18px; font-size: 13.5px; font-weight: 700; cursor: pointer; box-shadow: 0 6px 16px -4px rgba(0,196,204,0.5); transition: transform .12s ease; }
.btn-primary:hover { transform: translateY(-1px); }

.banner-ok {
  position: sticky; top: 74px; z-index: 8; margin: 0 auto 18px; max-width: 1100px;
  background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; border-radius: var(--radius-sm);
  padding: 13px 18px; font-size: 13.5px; font-weight: 700; display: none; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow-sm);
}
.banner-ok.show { display: flex; }
.banner-ok button { background: none; border: none; color: #166534; font-weight: 700; cursor: pointer; font-size: 16px; }

.tabla-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { text-align: left; padding: 13px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
th { background: rgba(11,30,61,0.02); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--text2); font-weight: 700; }
tr:last-child td { border-bottom: none; }
tbody tr { transition: background .12s ease; cursor: pointer; }
tbody tr:hover { background: rgba(11,30,61,0.02); }
.saldo-alto { color: var(--rojo); font-weight: 700; }
.empty-state { text-align: center; color: var(--text2); font-size: 14px; padding: 56px 0; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(11,30,61,0.35); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 50; padding: 16px; }
.modal-bg.show { display: flex; }
.modal-box { background: var(--surface); border-radius: 20px; padding: 26px 24px; width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; box-shadow: var(--shadow-md); }
.modal-box h2 { font-family: 'Montserrat', sans-serif; font-size: 17px; margin-bottom: 4px; }
.modal-sub { font-size: 12.5px; color: var(--text2); margin-bottom: 16px; }
.saldo-grande { font-family: 'Montserrat', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 16px; }
.detalle-tabla { width: 100%; font-size: 12.5px; margin-bottom: 16px; }
.detalle-tabla th, .detalle-tabla td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
.detalle-tabla .cargo { color: var(--rojo); }
.detalle-tabla .abono { color: var(--verde); }
.tag-verificado { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; background: #DCFCE7; color: #166534; margin-left: 6px; }
.link-chico { color: var(--turquesa); font-weight: 700; font-size: 11.5px; cursor: pointer; background: none; border: none; padding: 0; margin-left: 6px; }

.campo { margin-bottom: 13px; }
.campo label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; font-weight: 600; }
.campo input, .campo select { width: 100%; border: 1px solid transparent; background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13.5px; font-family: inherit; transition: all .15s ease; }
.campo input:focus, .campo select:focus { outline: none; background: white; border-color: var(--turquesa); box-shadow: 0 0 0 3px rgba(0,196,204,0.12); }
.foto-preview { max-width: 160px; border-radius: 10px; margin-top: 8px; display: none; border: 1px solid var(--border); }

.modal-actions { display: flex; gap: 8px; margin-top: 18px; }
.modal-actions button { flex: 1; border: none; border-radius: 999px; padding: 12px; font-size: 13.5px; font-weight: 700; cursor: pointer; transition: transform .12s ease; }
.modal-actions button:hover { transform: translateY(-1px); }
.modal-actions .btn-cancelar { background: var(--bg); color: var(--text2); flex: 0 0 auto; padding: 12px 20px; }
.modal-actions .btn-guardar { background: var(--turquesa); color: white; box-shadow: 0 6px 16px -4px rgba(0,196,204,0.5); }
.modal-err { color: var(--rojo); font-size: 12.5px; margin-top: 8px; display: none; }
.modal-err.show { display: block; }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <img class="logo" src="https://oscarjp88-arch.github.io/consultora/creditek/agentes/logos/creditek_logo_corregido_alta.png" alt="Creditek">
    <input type="email" id="loginEmail" placeholder="Correo" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Contraseña" autocomplete="current-password">
    <button id="btnLogin">Entrar</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div class="sin-perfil-screen" id="sinPerfilScreen">
  <div class="sin-perfil-box">
    <div class="icono">🔒</div>
    <h2>Sin perfil asignado</h2>
    <p>Tu usuario no tiene perfil asignado. Contacta al administrador.</p>
    <button id="btnSalirSinPerfil">Cerrar sesión</button>
  </div>
</div>

<div id="app">
  <div style="display:none;" aria-hidden="true">
    <b id="navNombre"></b><span id="navRolTienda"></span><button id="btnLogout"></button>
  </div>
  <div class="main-content">

  <div class="banner-ok" id="bannerOk">
    <span id="bannerOkTexto"></span>
    <button id="btnCerrarBanner">✕</button>
  </div>

  <div class="page">
    <div class="page-top"><h1>Cuenta corriente</h1></div>

    <div class="tabla-wrap">
      <table>
        <thead><tr><th>Tienda</th><th>Saldo actual</th><th>Último cargo</th><th>Último abono</th></tr></thead>
        <tbody id="tbodyTiendas"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none;">Cargando...</div>
    </div>
  </div>
  </div>
</div>

<!-- Modal: detalle de tienda -->
<div class="modal-bg" id="modalDetalle">
  <div class="modal-box">
    <h2 id="detalleTitulo">Tienda</h2>
    <div class="modal-sub">Saldo actual</div>
    <div class="saldo-grande" id="detalleSaldo">$0</div>
    <button class="btn-primary" id="btnAbrirAbono" style="margin-bottom:16px;">+ Registrar abono</button>
    <table class="detalle-tabla">
      <thead><tr><th>Fecha</th><th>Concepto</th><th>Cargo</th><th>Abono</th><th>Saldo</th></tr></thead>
      <tbody id="tbodyDetalle"></tbody>
    </table>
    <div class="modal-actions"><button class="btn-cancelar" id="btnCerrarDetalle" style="flex:1;">Cerrar</button></div>
  </div>
</div>

<!-- Modal: registrar abono -->
<div class="modal-bg" id="modalAbono">
  <div class="modal-box">
    <h2>Registrar abono</h2>
    <div class="modal-sub" id="abonoTiendaTexto"></div>
    <div class="campo"><label>Monto</label><input type="number" id="abonoMonto" min="1" placeholder="0"></div>
    <div class="campo">
      <label>Foto del soporte de consignación (obligatoria)</label>
      <input type="file" id="abonoFoto" accept="image/*" capture="environment">
      <img class="foto-preview" id="abonoFotoPreview">
    </div>
    <div class="modal-err" id="modalAbonoErr"></div>
    <div class="modal-actions">
      <button class="btn-cancelar" id="btnCancelarAbono">Cancelar</button>
      <button class="btn-guardar" id="btnGuardarAbono">Guardar abono</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://jfkmiyvcdfbsbwchyvol.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impma21peXZjZGZic2J3Y2h5dm9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMzA5NjgsImV4cCI6MjA5OTcwNjk2OH0.kpAjGLbDnycU-B1kc-AqOvj6X2xH-KHBiKB94V7prcQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentPerfil = null;
let movimientosCC = [];
let tiendasCache = [];
let tiendaDetalleActual = null;
let fotoAbonoBlob = null;

function esCentral() { return !!currentPerfil && (currentPerfil.rol === 'gerencia' || currentPerfil.rol === 'auditoria'); }

document.getElementById('btnLogin').addEventListener('click', hacerLogin);
document.getElementById('loginPass').addEventListener('keydown', (e) => { if (e.key === 'Enter') hacerLogin(); });

async function hacerLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('loginErr');
  err.classList.remove('show');
  if (!email || !password) return;
  btn.disabled = true; btn.textContent = 'Entrando...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  btn.disabled = false; btn.textContent = 'Entrar';
  if (error) { err.textContent = 'Correo o contraseña incorrectos.'; err.classList.add('show'); return; }
  entrarApp(data.user);
}

document.getElementById('btnLogout').addEventListener('click', cerrarSesion);
document.getElementById('btnSalirSinPerfil').addEventListener('click', cerrarSesion);
async function cerrarSesion() { await sb.auth.signOut(); location.reload(); }

async function entrarApp(user) {
  currentUser = user;
  const { data: perfil, error } = await sb.from('perfiles').select('*').eq('id', user.id).maybeSingle();
  if (error || !perfil || !perfil.activo) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('sinPerfilScreen').classList.add('show');
    return;
  }
  currentPerfil = perfil;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  pintarNavUser();
  initPagina();
}

function pintarNavUser() {
  document.getElementById('navNombre').textContent = currentPerfil.nombre || currentUser.email;
  const rolLabel = { gerencia: 'Gerencia', auditoria: 'Auditoría', admin_tienda: 'Admin tienda', asesor: 'Asesor' }[currentPerfil.rol] || currentPerfil.rol;
  document.getElementById('navRolTienda').textContent = currentPerfil.tienda_codigo ? `${rolLabel} · ${currentPerfil.tienda_codigo}` : rolLabel;
}

sb.auth.getSession().then(({ data }) => { if (data.session) entrarApp(data.session.user); });

function fmtCOP(n) { return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n || 0); }
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function mostrarBanner(texto) {
  document.getElementById('bannerOkTexto').textContent = texto;
  document.getElementById('bannerOk').classList.add('show');
}
document.getElementById('btnCerrarBanner').addEventListener('click', () => document.getElementById('bannerOk').classList.remove('show'));

// ─── Compresión de imagen (mismo patrón de registro.html) ─────────────
async function comprimirImagen(file, maxSide = 1600, quality = 0.7) {
  let bitmap;
  try {
    bitmap = await createImageBitmap(file);
  } catch (e) {
    bitmap = await new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = URL.createObjectURL(file);
    });
  }
  const w = bitmap.width, h = bitmap.height;
  const escala = Math.min(1, maxSide / Math.max(w, h));
  const canvas = document.createElement('canvas');
  canvas.width = Math.round(w * escala);
  canvas.height = Math.round(h * escala);
  const ctx = canvas.getContext('2d');
  ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
  return new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', quality));
}

// ─── Página: Cuenta corriente ───────────────────────────────────────────
function initPagina() {
  document.getElementById('btnCerrarDetalle').addEventListener('click', () => document.getElementById('modalDetalle').classList.remove('show'));
  document.getElementById('btnAbrirAbono').addEventListener('click', abrirModalAbono);
  document.getElementById('btnCancelarAbono').addEventListener('click', () => document.getElementById('modalAbono').classList.remove('show'));
  document.getElementById('abonoFoto').addEventListener('change', onFotoAbonoSeleccionada);
  document.getElementById('btnGuardarAbono').addEventListener('click', guardarAbono);

  cargarTodo();
}

async function cargarTodo() {
  const { data: tiendas } = await sb.from('origenes').select('codigo, nombre').eq('tipo', 'propia').eq('activo', true).order('nombre');
  tiendasCache = tiendas || [];
  await cargarMovimientosCC();
}

async function cargarMovimientosCC() {
  const empty = document.getElementById('emptyState');
  empty.style.display = 'block';
  empty.textContent = 'Cargando...';

  const { data, error } = await sb.from('cuenta_corriente').select('*').order('created_at', { ascending: true });
  if (error) { empty.textContent = 'Error cargando cuenta corriente: ' + error.message; return; }
  movimientosCC = data || [];
  renderTablaTiendas();
}

function calcularResumenPorTienda() {
  const mapa = {};
  movimientosCC.forEach(m => {
    if (!mapa[m.tienda_codigo]) mapa[m.tienda_codigo] = { saldo: 0, ultimoCargo: null, ultimoAbono: null };
    const r = mapa[m.tienda_codigo];
    if (m.tipo === 'cargo') { r.saldo += Number(m.monto); r.ultimoCargo = m; }
    else { r.saldo -= Number(m.monto); r.ultimoAbono = m; }
  });
  return mapa;
}

function renderTablaTiendas() {
  const resumen = calcularResumenPorTienda();
  // Para central: mostrar todas las tiendas propias (aunque tengan saldo 0). Para tienda: solo aparecerá la suya en `resumen` (RLS ya filtra).
  const codigosTienda = esCentral() ? tiendasCache.map(t => t.codigo) : Object.keys(resumen);
  const nombrePorCodigo = Object.fromEntries(tiendasCache.map(t => [t.codigo, t.nombre]));

  const tbody = document.getElementById('tbodyTiendas');
  const empty = document.getElementById('emptyState');
  if (!codigosTienda.length) { tbody.innerHTML = ''; empty.style.display = 'block'; empty.textContent = 'No hay datos de cuenta corriente todavía.'; return; }
  empty.style.display = 'none';

  tbody.innerHTML = codigosTienda.map(codigo => {
    const r = resumen[codigo] || { saldo: 0, ultimoCargo: null, ultimoAbono: null };
    return `
      <tr data-tienda="${codigo}">
        <td>${escapeHtml(nombrePorCodigo[codigo] || codigo)}</td>
        <td class="${r.saldo > 0 ? 'saldo-alto' : ''}">${fmtCOP(r.saldo)}</td>
        <td>${r.ultimoCargo ? `${escapeHtml(r.ultimoCargo.concepto)} — ${new Date(r.ultimoCargo.created_at).toLocaleDateString('es-CO')}` : '—'}</td>
        <td>${r.ultimoAbono ? `${fmtCOP(r.ultimoAbono.monto)} — ${new Date(r.ultimoAbono.created_at).toLocaleDateString('es-CO')}` : '—'}</td>
      </tr>
    `;
  }).join('');

  tbody.querySelectorAll('tr').forEach(tr => tr.addEventListener('click', () => abrirDetalleTienda(tr.dataset.tienda, nombrePorCodigo[tr.dataset.tienda])));
}

function abrirDetalleTienda(codigo, nombre) {
  tiendaDetalleActual = { codigo, nombre };
  document.getElementById('detalleTitulo').textContent = nombre || codigo;
  document.getElementById('btnAbrirAbono').style.display = (esCentral() || currentPerfil.tienda_codigo === codigo) ? 'inline-block' : 'none';

  const movs = movimientosCC.filter(m => m.tienda_codigo === codigo).sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  let saldoAcumulado = 0;
  const filas = movs.map(m => {
    saldoAcumulado += m.tipo === 'cargo' ? Number(m.monto) : -Number(m.monto);
    return { ...m, saldoAcumulado };
  }).reverse();

  document.getElementById('detalleSaldo').textContent = fmtCOP(saldoAcumulado);
  document.getElementById('tbodyDetalle').innerHTML = filas.map(m => `
    <tr>
      <td>${new Date(m.created_at).toLocaleDateString('es-CO')}</td>
      <td>${escapeHtml(m.concepto)}${m.tipo === 'abono' && m.verificado_at ? '<span class="tag-verificado">Verificado</span>' : ''}${m.tipo === 'abono' && !m.verificado_at && esCentral() ? `<button class="link-chico" data-cc="${m.id}" data-abono="${m.referencia_id}">Marcar verificado</button>` : ''}</td>
      <td class="cargo">${m.tipo === 'cargo' ? fmtCOP(m.monto) : ''}</td>
      <td class="abono">${m.tipo === 'abono' ? fmtCOP(m.monto) : ''}</td>
      <td>${fmtCOP(m.saldoAcumulado)}</td>
    </tr>
  `).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text2);">Sin movimientos todavía.</td></tr>';

  document.getElementById('tbodyDetalle').querySelectorAll('.link-chico[data-abono]').forEach(btn => {
    btn.addEventListener('click', () => marcarAbonoVerificado(btn.dataset.abono));
  });

  document.getElementById('modalDetalle').classList.add('show');
}

async function marcarAbonoVerificado(abonoId) {
  if (!abonoId || abonoId === 'null') return;
  const { error } = await sb.from('abonos').update({ verificado_por: currentUser.id, verificado_at: new Date().toISOString() }).eq('id', abonoId);
  if (error) { alert('No se pudo marcar como verificado: ' + error.message); return; }
  await cargarMovimientosCC();
  abrirDetalleTienda(tiendaDetalleActual.codigo, tiendaDetalleActual.nombre);
}

// ─── Registrar abono ─────────────────────────────────────────────────
function abrirModalAbono() {
  const codigo = esCentral() ? tiendaDetalleActual.codigo : currentPerfil.tienda_codigo;
  const nombre = esCentral() ? tiendaDetalleActual.nombre : (tiendasCache.find(t => t.codigo === codigo)?.nombre || codigo);
  document.getElementById('abonoTiendaTexto').textContent = 'Tienda: ' + nombre;
  document.getElementById('abonoMonto').value = '';
  document.getElementById('abonoFoto').value = '';
  document.getElementById('abonoFotoPreview').style.display = 'none';
  document.getElementById('modalAbonoErr').classList.remove('show');
  fotoAbonoBlob = null;
  document.getElementById('modalAbono').classList.add('show');
}

async function onFotoAbonoSeleccionada(e) {
  const file = e.target.files[0];
  if (!file) return;
  fotoAbonoBlob = await comprimirImagen(file);
  const preview = document.getElementById('abonoFotoPreview');
  preview.src = URL.createObjectURL(fotoAbonoBlob);
  preview.style.display = 'block';
}

async function guardarAbono() {
  const err = document.getElementById('modalAbonoErr');
  err.classList.remove('show');
  const codigo = esCentral() ? tiendaDetalleActual.codigo : currentPerfil.tienda_codigo;
  const monto = Number(document.getElementById('abonoMonto').value || 0);

  if (monto <= 0) { err.textContent = 'Ingresa un monto válido.'; err.classList.add('show'); return; }
  if (!fotoAbonoBlob) { err.textContent = 'La foto del soporte de consignación es obligatoria.'; err.classList.add('show'); return; }

  const btn = document.getElementById('btnGuardarAbono');
  btn.disabled = true; btn.textContent = 'Guardando...';

  const path = `${codigo}/${Date.now()}_${Math.random().toString(36).slice(2, 8)}.jpg`;
  const subida = await sb.storage.from('soportes').upload(path, fotoAbonoBlob, { contentType: 'image/jpeg' });
  if (subida.error) {
    btn.disabled = false; btn.textContent = 'Guardar abono';
    err.textContent = 'No se pudo subir la foto: ' + subida.error.message;
    err.classList.add('show');
    return;
  }

  const { data: abono, error: errAbono } = await sb.from('abonos').insert({
    tienda_codigo: codigo, monto, soporte_path: path, registrado_por: currentUser.id,
  }).select().maybeSingle();

  if (errAbono) {
    btn.disabled = false; btn.textContent = 'Guardar abono';
    err.textContent = 'No se pudo registrar el abono: ' + errAbono.message;
    err.classList.add('show');
    return;
  }

  const { error: errCC } = await sb.from('cuenta_corriente').insert({
    tienda_codigo: codigo, tipo: 'abono', concepto: 'Consignación', monto,
    referencia_tipo: 'abono', referencia_id: abono.id, usuario: currentUser.id,
  });

  btn.disabled = false; btn.textContent = 'Guardar abono';

  if (errCC) { err.textContent = 'El abono se guardó, pero no se pudo reflejar en cuenta corriente: ' + errCC.message; err.classList.add('show'); return; }

  document.getElementById('modalAbono').classList.remove('show');
  mostrarBanner(`✅ Abono de ${fmtCOP(monto)} registrado correctamente.`);
  await cargarMovimientosCC();
  if (tiendaDetalleActual) abrirDetalleTienda(tiendaDetalleActual.codigo, tiendaDetalleActual.nombre);
}
</script>
