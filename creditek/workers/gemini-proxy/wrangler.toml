name               = "creditek-gemini-proxy"
main               = "index.js"
compatibility_date = "2024-09-23"

# Una vez desplegado, la URL será:
# https://creditek-gemini-proxy.<tu-subdominio>.workers.dev
#
# Para dominio propio, descomenta:
# [[routes]]
# pattern = "api.tudominio.com/gemini-proxy/*"
# zone_name = "tudominio.com"

# IMPORTANTE: NO pongas la API key aquí.
# Configúrala como secret con: wrangler secret put GEMINI_API_KEY
# Si no usas secret, el agente la envía en el body de cada petición.
