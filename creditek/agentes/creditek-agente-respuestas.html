<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agente Respuestas — Creditek</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0B1E3D;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .badge {
      background: #00C4CC;
      color: #0B1E3D;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 24px;
    }
    h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 12px; }
    p { color: #a0b4cc; font-size: 1.1rem; margin-bottom: 36px; }
    a {
      background: #00C4CC;
      color: #0B1E3D;
      text-decoration: none;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 8px;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="badge">Próximamente</div>
  <h1>Agente Respuestas</h1>
  <p>Este agente estará disponible muy pronto.</p>
  <a href="index.html">← Volver al inicio</a>
</body>
</html>
