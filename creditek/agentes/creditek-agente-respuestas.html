<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sofia · CRM WhatsApp</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f0f2f5;--card:#fff;--border:#e2e8f0;--text:#1a1a2e;--text2:#64748b;--text3:#94a3b8;--accent:#0ea5e9;--accent2:#0284c7;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;--sidebar-w:340px;--topbar:56px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

.topbar{height:var(--topbar);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-left h1{font-size:16px;font-weight:600}
.topbar-left h1 span{color:var(--accent)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-stats{display:flex;gap:20px}
.top-stat{text-align:center}
.top-stat-val{font-size:18px;font-weight:600}
.top-stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.topbar-actions{display:flex;gap:8px}
.btn{border:none;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:#f8fafc}

.main{display:flex;flex:1;overflow:hidden}

.sidebar{width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px}
.sidebar-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sidebar-tab:hover{color:var(--text)}
.tab-badge{background:#e2e8f0;color:var(--text2);padding:1px 6px;border-radius:8px;font-size:10px}
.sidebar-tab.active .tab-badge{background:#e0f2fe;color:var(--accent)}

.sidebar-filters{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.search-box{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;outline:none;background:var(--bg)}
.search-box:focus{border-color:var(--accent)}
.filter-sel{flex:1;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;background:var(--card);cursor:pointer;outline:none;min-width:0}

.conv-scroll{flex:1;overflow-y:auto}
.conv-item{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s;position:relative}
.conv-item:hover{background:#f8fafc}
.conv-item.active{background:#e0f2fe;border-left:3px solid var(--accent)}
.conv-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;background:var(--purple)}
.conv-info{flex:1;min-width:0}
.conv-row{display:flex;justify-content:space-between;align-items:center}
.conv-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-time{font-size:10px;color:var(--text3);flex-shrink:0}
.conv-preview{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-tags{display:flex;gap:3px;margin-top:4px}
.tag{font-size:9px;padding:1px 6px;border-radius:6px;font-weight:500}
.tag-new{background:#dbeafe;color:#1d4ed8}
.tag-optin{background:#dcfce7;color:#15803d}
.tag-lead{background:#fef3c7;color:#92400e}
.tag-baja{background:#fee2e2;color:#991b1b}
.unread-dot{position:absolute;top:14px;left:6px;width:8px;height:8px;border-radius:50%;background:var(--accent)}

.center-panel{flex:1;display:flex;flex-direction:column;background:#f8fafc;min-width:0}
.chat-header{background:var(--card);padding:12px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.chat-header-left h3{font-size:14px;font-weight:600}
.chat-header-left p{font-size:11px;color:var(--text2)}
.chat-badges{display:flex;gap:4px}
.optin-pill{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:500}
.optin-si{background:#dcfce7;color:#15803d}
.optin-no{background:#fee2e2;color:#991b1b}

.chat-msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 120px)}
.msg{max-width:70%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;position:relative}
.msg-in{background:var(--card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.msg-out{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg-meta{font-size:10px;margin-top:4px;opacity:.6}
.msg-intent{display:inline-block;font-size:9px;padding:1px 6px;border-radius:6px;background:rgba(0,0,0,.08);margin-top:4px}
.msg-out .msg-intent{background:rgba(255,255,255,.2)}

.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text3);gap:8px}
.chat-empty i{font-size:48px;opacity:.3}

.right-panel{width:280px;background:var(--card);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;display:none}
.right-panel.show{display:block}
.client-profile{padding:20px;text-align:center;border-bottom:1px solid var(--border)}
.client-avatar-lg{width:56px;height:56px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:#fff;margin:0 auto 10px}
.client-name{font-size:15px;font-weight:600}
.client-phone{font-size:12px;color:var(--text2)}
.client-detail{padding:14px 20px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px;border-bottom:1px solid #f1f5f9}
.detail-label{color:var(--text2)}
.detail-val{font-weight:500}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%}
.dot-g{background:var(--green)}
.dot-r{background:var(--red)}
.section-head{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);padding:14px 20px 6px;font-weight:500}

.table-view{display:none;flex:1;overflow-y:auto;padding:16px 20px;background:var(--bg)}
.table-view.active{display:block}
.data-table{width:100%;border-collapse:collapse;background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border);font-size:12px}
.data-table th{text-align:left;padding:10px 12px;font-size:10px;color:var(--text3);text-transform:uppercase;background:#f9fafb;border-bottom:1px solid var(--border);font-weight:500}
.data-table td{padding:9px 12px;border-bottom:1px solid #f8fafc}
.data-table tr:hover{background:#f8fafc}

.chart-container{padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card)}
.chart-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px}

  .corr-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
  .corr-badge-ok{background:#dcfce7;color:#16a34a;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
  .corr-badge-off{background:#fee2e2;color:#dc2626;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
  .corr-msg{font-size:12px;color:var(--text2);margin:4px 0 8px;padding:8px;background:#f8fafc;border-radius:6px;line-height:1.5;}
  .corr-form{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
  .corr-form h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;}
  .corr-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;display:block;}
  .corr-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:12.5px;font-family:inherit;color:var(--text);background:#fafafa;resize:vertical;min-height:55px;margin-bottom:10px;box-sizing:border-box;}
  .corr-input:focus{outline:none;border-color:var(--accent);background:#fff;}
  .corr-btn-save{background:#16a34a;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .corr-btn-del{background:none;border:none;color:#dc2626;cursor:pointer;font-size:11px;padding:2px 4px;}
  .corr-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .corr-stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
  .corr-stat-num{font-size:22px;font-weight:700;color:var(--accent);}
  .corr-stat-label{font-size:10px;color:var(--text3);margin-top:2px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1><i class="ti ti-message-chatbot" style="color:var(--accent);font-size:20px" aria-hidden="true"></i> Sofia · <span>CRM WhatsApp</span></h1>

  </div>
  <div class="topbar-stats">
    <div class="top-stat"><div class="top-stat-val" id="s-clientes">-</div><div class="top-stat-label">Clientes</div></div>
    <div class="top-stat"><div class="top-stat-val" id="s-convs">-</div><div class="top-stat-label">Hoy</div></div>
    <div class="top-stat"><div class="top-stat-val" id="s-optins">-</div><div class="top-stat-label">Opt-ins</div></div>
    <div class="top-stat"><div class="top-stat-val" id="s-leads">-</div><div class="top-stat-label">Leads</div></div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-tabs">

  <div class="center-panel" id="center-chats">

      <thead><tr><th>Nombre</th><th>Telefono</th><th>Segmento</th><th>Estado</th><th>Datos</th><th>Op.</th><th>Com.</th><th>Fuente</th><th>Fecha</th></tr></thead>

    </table>

  <div class="table-view" id="center-optins">

      <thead><tr><th>Nombre</th><th>Telefono</th><th>Datos</th><th>Operativo</th><th>Comercial</th><th>Fecha autorizacion</th><th>Canal</th></tr></thead>
      <tbody id="optins-tbody"></tbody>

  <div class="right-panel" id="right-panel"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js">
  <!-- PANEL CORRECCIONES SOFIA IA -->
  <div class="table-view" id="view-correcciones">
    <div style="max-width:660px;margin:0 auto;padding:16px 0;">
      <div class="corr-stats">
        <div class="corr-stat"><div class="corr-stat-num" id="corrTotal">0</div><div class="corr-stat-label">Correcciones activas</div></div>
        <div class="corr-stat"><div class="corr-stat-num" id="corrHoy">0</div><div class="corr-stat-label">Agregadas hoy</div></div>
      </div>
      <div class="corr-form">
        <h3>✏️ Enseñarle algo nuevo a Sofía</h3>
        <label class="corr-label">Mensaje del cliente</label>
        <textarea class="corr-input" id="corrMensaje" placeholder="Ej: tienen samsung?"></textarea>
        <label class="corr-label">Respuesta incorrecta de Sofía (opcional)</label>
        <textarea class="corr-input" id="corrMala" placeholder="Lo que Sofía respondió mal..."></textarea>
        <label class="corr-label">✓ Respuesta correcta</label>
        <textarea class="corr-input" id="corrBuena" placeholder="Así debería responder Sofía..."></textarea>
        <label class="corr-label">Contexto (opcional)</label>
        <textarea class="corr-input" id="corrContexto" placeholder="Ej: cliente en Chinú preguntando por Samsung a crédito" style="min-height:38px;"></textarea>
        <button class="corr-btn-save" onclick="guardarCorreccion()">💾 Guardar — Sofía aprende esto</button>
        <div id="corrMsg" style="font-size:12px;margin-top:8px;min-height:18px;"></div>
      </div>
      <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px;">Correcciones guardadas</div>
      <div id="corrList"><div style="text-align:center;color:var(--text3);padding:30px;font-size:13px;">Cargando...</div></div>
    </div>
  </div>

// ── CORRECCIONES SOFIA IA ─────────────────────────────────────────
async function cargarCorrecciones(){
  try{
    const res=await fetch(SB+'/rest/v1/correcciones_sofia?order=created_at.desc&limit=50',{headers:H});
    const data=await res.json();
    const activas=data.filter(c=>c.activa);
    const hoy=data.filter(c=>new Date(c.created_at).toDateString()===new Date().toDateString());
    document.getElementById('corrTotal').textContent=activas.length;
    document.getElementById('corrHoy').textContent=hoy.length;
    document.getElementById('b-correcciones').textContent=activas.length;
    const list=document.getElementById('corrList');
    if(!data.length){list.innerHTML='<div style="text-align:center;color:var(--text3);padding:30px;font-size:13px;">Aun no hay correcciones. Agrega la primera arriba 👆</div>';return;}
    list.innerHTML=data.map(c=>`<div class="corr-card" id="cc-${c.id}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-size:10px;color:var(--text3);">${new Date(c.created_at).toLocaleDateString('es-CO')}</div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span class="${c.activa?'corr-badge-ok':'corr-badge-off'}">${c.activa?'✓ Activa':'Desactivada'}</span>
          <button class="corr-btn-del" onclick="toggleCorr('${c.id}',${c.activa})">${c.activa?'Desactivar':'Activar'}</button>
          <button class="corr-btn-del" onclick="eliminarCorr('${c.id}')">🗑</button>
        </div>
      </div>
      <div style="font-size:10px;color:var(--text3);margin-bottom:2px;">CLIENTE:</div>
      <div class="corr-msg">${c.mensaje_cliente}</div>
      ${c.respuesta_mala?`<div style="font-size:10px;color:#dc2626;margin-bottom:2px;">SOFÍA RESPONDIÓ MAL:</div><div class="corr-msg" style="background:#fee2e2;">${c.respuesta_mala}</div>`:''}
      <div style="font-size:10px;color:#16a34a;margin-bottom:2px;">SOFÍA DEBE RESPONDER:</div>
      <div class="corr-msg" style="background:#dcfce7;">${c.respuesta_correcta}</div>
      ${c.contexto?`<div style="font-size:10px;color:var(--text3);margin-top:4px;">Contexto: ${c.contexto}</div>`:''}
    </div>`).join('');
  }catch(e){document.getElementById('corrList').innerHTML='<div style="color:#dc2626;font-size:12px;padding:16px;">Error cargando correcciones</div>';}
}

async function guardarCorreccion(){
  const mensaje=document.getElementById('corrMensaje').value.trim();
  const mala=document.getElementById('corrMala').value.trim();
  const buena=document.getElementById('corrBuena').value.trim();
  const contexto=document.getElementById('corrContexto').value.trim();
  const msg=document.getElementById('corrMsg');
  if(!mensaje||!buena){msg.style.color='#dc2626';msg.textContent='El mensaje del cliente y la respuesta correcta son obligatorios.';return;}
  try{
    const res=await fetch(SB+'/rest/v1/correcciones_sofia',{method:'POST',headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify({mensaje_cliente:mensaje,respuesta_mala:mala||null,respuesta_correcta:buena,contexto:contexto||null,activa:true})});
    if(res.ok){
      msg.style.color='#16a34a';msg.textContent='✓ Guardado! Sofia ya sabe esto.';
      document.getElementById('corrMensaje').value='';document.getElementById('corrMala').value='';document.getElementById('corrBuena').value='';document.getElementById('corrContexto').value='';
      setTimeout(()=>msg.textContent='',3000);cargarCorrecciones();
    }else{throw new Error();}
  }catch(e){msg.style.color='#dc2626';msg.textContent='Error al guardar. Intenta de nuevo.';}
}

async function toggleCorr(id,activa){
  await fetch(SB+'/rest/v1/correcciones_sofia?id=eq.'+id,{method:'PATCH',headers:{...H,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify({activa:!activa})});
  cargarCorrecciones();
}

async function eliminarCorr(id){
  if(!confirm('Eliminar esta correccion?'))return;
  await fetch(SB+'/rest/v1/correcciones_sofia?id=eq.'+id,{method:'DELETE',headers:{...H,Prefer:'return=minimal'}});
  cargarCorrecciones();
}
</script>
<script>
const API='https://creditek-bot.comercial-853.workers.dev';
let cityMap={};let allTiendas=[];
let allConvs=[],allClients=[],grouped={},currentTel=null;
const colors=['#8b5cf6','#0ea5e9','#f59e0b','#ef4444','#22c55e','#ec4899','#6366f1','#14b8a6'];

async function loadTiendas(){
  try{
    allTiendas=await(await fetch(API+'/api/tiendas')).json();
    cityMap={};
    const ciudades=new Set();
    allTiendas.forEach(t=>{cityMap[t.id]=t.ciudad;ciudades.add(t.ciudad)});
    const sel=document.getElementById('filterCity');
    sel.innerHTML='<option value="all">Ciudad</option>';
    [...ciudades].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o)});
  }catch(e){console.error(e)}
}
async function loadAll(){await loadTiendas();await Promise.all([loadStats(),loadConvs(),loadClients()])}

async function loadStats(){
  try{
    const d=await(await fetch(API+'/api/stats')).json();
    document.getElementById('s-clientes').textContent=d.total_clientes||0;
    document.getElementById('s-convs').textContent=d.conversaciones_hoy||0;
    document.getElementById('s-optins').textContent=d.optins_activos||0;
    document.getElementById('s-leads').textContent=d.leads_nuevos||0;
  }catch(e){console.error(e)}
}

const SUPA='https://ditiwpndvmyuqcagupea.supabase.co/rest/v1';
const SUPA_KEY='sb_publishable_oVNantrnKzXdtXu5B7YQIg_9fxHp7aW';
const supaFetch=url=>fetch(SUPA+url,{headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY}});

async function loadConvs(){
  try{
    const convResp=await(await supaFetch('/conversaciones?select=*&order=timestamp.desc&limit=1000')).json();
    allConvs=Array.isArray(convResp)?convResp:[];
    grouped={};
    allConvs.forEach(c=>{if(!grouped[c.telefono])grouped[c.telefono]=[];grouped[c.telefono].push(c)});
    document.getElementById('b-chats').textContent=Object.keys(grouped).length;
    applyFilters();
  }catch(e){console.error(e)}
}

async function loadClients(){
  try{
    allClients=await(await supaFetch('/clientes?select=*&order=created_at.desc&limit=500')).json();
    document.getElementById('b-clients').textContent=allClients.length;
    document.getElementById('b-optins').textContent=allClients.filter(c=>c.optin_datos).length;
    renderClients();
    renderOptins();
  }catch(e){console.error(e)}
}

function applyFilters(){
  const s=document.getElementById('searchInput').value.toLowerCase();
  const df=document.getElementById('filterDate').value;
  const cf=document.getElementById('filterCity').value;
  const sf=document.getElementById('filterStatus').value;
  let entries=Object.entries(grouped);
  if(s)entries=entries.filter(([t])=>{const c=allClients.find(x=>x.telefono===t);return t.includes(s)||(c?.nombre||'').toLowerCase().includes(s)});
  if(df!=='all'){const now=new Date();let since;
    if(df==='today')since=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    else if(df==='yesterday')since=new Date(now.getFullYear(),now.getMonth(),now.getDate()-1);
    else if(df==='week')since=new Date(now.getTime()-7*864e5);
    else since=new Date(now.getTime()-30*864e5);
    entries=entries.filter(([,m])=>m.some(x=>new Date(x.timestamp)>=since))}
  if(cf!=='all')entries=entries.filter(([t])=>{const c=allClients.find(x=>x.telefono===t);if(!c||!c.tienda_origen_id)return false;return cityMap[c.tienda_origen_id]===cf});
  if(sf!=='all')entries=entries.filter(([t])=>{const c=allClients.find(x=>x.telefono===t);if(!c)return false;
    if(sf==='nuevo')return c.estado_funnel==='nuevo';if(sf==='con_optin')return c.optin_datos;
    if(sf==='sin_optin')return!c.optin_datos;if(sf==='lead')return c.estado_funnel==='lead';
    if(sf==='baja')return c.estado_funnel==='baja';return true});
  renderConvList(entries);
}

function renderConvList(entries){
  const el=document.getElementById('conv-list');
  if(!entries.length){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--text3);font-size:13px"><i class="ti ti-inbox-off" style="font-size:32px;display:block;margin-bottom:8px;opacity:.4" aria-hidden="true"></i>Sin resultados</div>';return}
  entries.sort((a,b)=>new Date(b[1][0].timestamp)-new Date(a[1][0].timestamp));
  el.innerHTML=entries.map(([tel,msgs])=>{
    const cl=allClients.find(c=>c.telefono===tel);
    const name=cl?.nombre||tel;
    const last=msgs[0];
    const t=timeAgo(last.timestamp);
    const prev=(last.contenido||'').substring(0,50);
    const init=name.substring(0,2).toUpperCase();
    const ci=Math.abs(hashCode(tel))%colors.length;
    const hasUnread=last.direccion==='entrada'&&last.respondido_por===null;
    let tags='';
    if(cl){
      if(!cl.optin_datos)tags+='<span class="tag tag-new">Nuevo</span>';
      if(cl.optin_datos)tags+='<span class="tag tag-optin">Opt-in</span>';
      if(cl.estado_funnel==='baja')tags+='<span class="tag tag-baja">Baja</span>';
    }
    return '<div class="conv-item'+(currentTel===tel?' active':'')+'" onclick="openChat(\''+tel+'\')">'+(hasUnread?'<div class="unread-dot"></div>':'')+'<div class="conv-avatar" style="background:'+colors[ci]+'">'+init+'</div><div class="conv-info"><div class="conv-row"><span class="conv-name">'+name+'</span><span class="conv-time">'+t+'</span></div><div class="conv-preview">'+(last.direccion==='salida'?'Sofia: ':'')+prev+'</div><div class="conv-tags">'+tags+'</div></div></div>'
  }).join('');
}

function openChat(tel){
  currentTel=tel;
  const msgs=grouped[tel]||[];
  const cl=allClients.find(c=>c.telefono===tel);
  const area=document.getElementById('chat-area');
  const rp=document.getElementById('right-panel');
  let badges='';
  if(cl){
    badges+='<span class="optin-pill '+(cl.optin_datos?'optin-si':'optin-no')+'"><i class="ti ti-shield-check" style="font-size:12px" aria-hidden="true"></i> Datos</span>';
    badges+='<span class="optin-pill '+(cl.optin_operativo?'optin-si':'optin-no')+'"><i class="ti ti-bell" style="font-size:12px" aria-hidden="true"></i> Op.</span>';
    badges+='<span class="optin-pill '+(cl.optin_comercial?'optin-si':'optin-no')+'"><i class="ti ti-megaphone" style="font-size:12px" aria-hidden="true"></i> Com.</span>';
  }
  const msgsHtml=[...msgs].reverse().map(m=>{
    const t=new Date(m.timestamp).toLocaleString('es-CO',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'});
    const isIn=m.direccion==='entrada';
    const intentTag=m.intent?'<div class="msg-intent">'+m.intent+'</div>':'';
    return '<div class="msg '+(isIn?'msg-in':'msg-out')+'"><div>'+(m.contenido||'')+'</div><div class="msg-meta">'+(isIn?'Cliente':'Sofia')+' · '+t+'</div>'+intentTag+'</div>'
  }).join('');
  area.innerHTML='<div class="chat-header"><div class="chat-header-left"><h3>'+(cl?.nombre||tel)+'</h3><p>'+tel+' · '+(cl?.segmento||'sin clasificar')+'</p></div><div class="chat-badges">'+badges+'</div></div><div class="chat-msgs" id="chat-msgs-inner">'+msgsHtml+'</div>';
  setTimeout(()=>{const cm=document.getElementById('chat-msgs-inner');if(cm)cm.scrollTop=cm.scrollHeight;},50);
  rp.className='right-panel show';
  const ci=Math.abs(hashCode(tel))%colors.length;
  const init=(cl?.nombre||tel).substring(0,2).toUpperCase();
  rp.innerHTML='<div class="client-profile"><div class="client-avatar-lg" style="background:'+colors[ci]+'">'+init+'</div><div class="client-name">'+(cl?.nombre||'Sin nombre')+'</div><div class="client-phone">'+tel+'</div></div>'+
    '<div class="section-head">Informacion</div><div class="client-detail">'+
    '<div class="detail-row"><span class="detail-label">Segmento</span><span class="detail-val">'+(cl?.segmento||'-')+'</span></div>'+
    '<div class="detail-row"><span class="detail-label">Estado</span><span class="detail-val">'+(cl?.estado_funnel||'-')+'</span></div>'+
    '<div class="detail-row"><span class="detail-label">Fuente</span><span class="detail-val">'+(cl?.fuente||'-')+'</span></div>'+
    '<div class="detail-row"><span class="detail-label">Registro</span><span class="detail-val">'+(cl?.created_at?new Date(cl.created_at).toLocaleDateString('es-CO'):'-')+'</span></div></div>'+
    '<div class="section-head">Autorizaciones</div><div class="client-detail">'+
    '<div class="detail-row"><span class="detail-label">Datos personales</span><span><span class="dot '+(cl?.optin_datos?'dot-g':'dot-r')+'"></span></span></div>'+
    '<div class="detail-row"><span class="detail-label">Operativo</span><span><span class="dot '+(cl?.optin_operativo?'dot-g':'dot-r')+'"></span></span></div>'+
    '<div class="detail-row"><span class="detail-label">Comercial</span><span><span class="dot '+(cl?.optin_comercial?'dot-g':'dot-r')+'"></span></span></div></div>'+
    '<div class="section-head">Mensajes</div><div class="client-detail">'+
    '<div class="detail-row"><span class="detail-label">Total mensajes</span><span class="detail-val">'+msgs.length+'</span></div>'+
    '<div class="detail-row"><span class="detail-label">Ultimo contacto</span><span class="detail-val">'+(msgs[0]?timeAgo(msgs[0].timestamp):'-')+'</span></div></div>';
  applyFilters();
}

function renderClients(){
  const el=document.getElementById('clients-tbody');
  const dot=v=>'<span class="dot '+(v?'dot-g':'dot-r')+'"></span>';
  el.innerHTML=allClients.map(c=>'<tr style="cursor:pointer" onclick="switchView(\'chats\',document.querySelector(\'.sidebar-tab\'));openChat(\''+c.telefono+'\')"><td style="font-weight:500">'+(c.nombre||'Sin nombre')+'</td><td>'+c.telefono+'</td><td>'+(c.segmento||'-')+'</td><td>'+(c.estado_funnel||'-')+'</td><td>'+dot(c.optin_datos)+'</td><td>'+dot(c.optin_operativo)+'</td><td>'+dot(c.optin_comercial)+'</td><td>'+(c.fuente||'-')+'</td><td>'+(c.created_at?new Date(c.created_at).toLocaleDateString('es-CO'):'-')+'</td></tr>').join('');
}

function renderOptins(){
  const el=document.getElementById('optins-tbody');
  const dot=v=>'<span class="dot '+(v?'dot-g':'dot-r')+'"></span>';
  const list=allClients;
  el.innerHTML=list.map(c=>'<tr><td style="font-weight:500">'+(c.nombre||'Sin nombre')+'</td><td>'+c.telefono+'</td><td>'+dot(c.optin_datos)+'</td><td>'+dot(c.optin_operativo)+'</td><td>'+dot(c.optin_comercial)+'</td><td>'+(c.optin_fecha?new Date(c.optin_fecha).toLocaleString('es-CO'):'-')+'</td><td>'+(c.optin_canal||'-')+'</td></tr>').join('');
}

function switchView(view,el){
  document.querySelectorAll('.sidebar-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('center-chats').style.display=view==='chats'?'flex':'none';
  document.getElementById('center-clients').className=view==='clients'?'table-view active':'table-view';
  document.getElementById('center-optins').className=view==='optins'?'table-view active':'table-view';
  document.getElementById('view-correcciones').className=view==='correcciones'?'table-view active':'table-view';
  document.getElementById('right-panel').className=view==='chats'&&currentTel?'right-panel show':'right-panel';
  if(view==='correcciones') cargarCorrecciones();
}

function exportCSV(){
  const rows=allClients.map(c=>[c.nombre||'',c.telefono,c.segmento||'',c.optin_datos?'SI':'NO',c.optin_operativo?'SI':'NO',c.optin_comercial?'SI':'NO',c.estado_funnel||'',c.fuente||''].join(','));
  const csv='Nombre,Telefono,Segmento,Datos,Operativo,Comercial,Estado,Fuente\n'+rows.join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='creditek_clientes_'+new Date().toISOString().split('T')[0]+'.csv';a.click();
}

function timeAgo(ts){
  const d=new Date(ts);const now=new Date();const diff=Math.floor((now-d)/1e3);
  if(diff<60)return'ahora';if(diff<3600)return Math.floor(diff/60)+'m';
  if(diff<86400)return Math.floor(diff/3600)+'h';
  return d.toLocaleDateString('es-CO',{day:'2-digit',month:'short'});
}

function hashCode(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return h}

loadAll();
setInterval(loadAll,15000);
</script>
